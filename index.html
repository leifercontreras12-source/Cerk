<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>+CERK v7.0 - Mapa Interactivo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --bg-base: #f4f7f9; --navy: #1a3a5f; --accent: #00b4d8; }
        body { 
            background-color: var(--bg-base); margin: 0; font-family: 'Segoe UI', sans-serif; color: var(--navy); overflow-x: hidden;
        }
        .app-container { display: flex; flex-direction: column; align-items: center; padding: 0; min-height: 100vh; transition: opacity 0.3s; }
        
        /* LOGO SUBIMINAL */
        .brand { 
            font-family: "Brush Script MT", cursive; font-size: 1.8rem; margin-top: 4px; margin-bottom: 8px; color: var(--navy);
            opacity: 0.5; text-align: center; width: 100%;
        }
        .brand span { color: var(--accent); font-family: sans-serif; font-weight: 900; margin-right: -4px; }
        
        .dial-wrapper { width: 100%; height: 132px; display: flex; flex-direction: column; align-items: center; margin-bottom: 2px; }
        .dial-label { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; opacity: 0.9; }
        
        .scene { width: 100%; height: 88px; perspective: 1200px; display: flex; justify-content: center; }
        .carousel { width: 135px; height: 82px; position: absolute; transform-style: preserve-3d; transition: transform 0.5s ease-out; cursor: pointer; }
        
        .carousel__item {
            position: absolute; width: 125px; height: 80px; background: white; border: 1.5px solid #d1d9e6; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 4px 8px rgba(26, 58, 95, 0.06); backface-visibility: hidden; overflow: hidden;
        }
        
        .item-img { width: 100%; height: 74%; object-fit: cover; border-bottom: 1px solid #f0f0f0; }
        .item-text { font-size: 0.56rem; font-weight: 900; margin: 2px 1px; text-transform: uppercase; text-align: center; }

        /* VISTA DE MAPA (OCULTA POR DEFECTO) */
        #map-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white;
            z-index: 1000; display: none; flex-direction: column;
        }
        #map { flex: 1; width: 100%; }
        .map-header { background: var(--navy); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-close-map { background: var(--accent); color: white; border: none; padding: 5px 15px; border-radius: 5px; font-weight: bold; }

        .footer-cta { width: 100%; background: white; padding: 15px 0; text-align: center; border-top: 1px solid #e0e0e0; }
        .btn-registrar { background: var(--navy); color: white; padding: 10px 30px; border-radius: 40px; font-weight: 800; border: none; }
    </style>
</head>
<body>

    <div class="app-container" id="main-ui">
        <div class="brand"><span>+</span>CERK</div>
        <div id="dials-root" style="width: 100%;"></div>
        <div class="footer-cta">
            <button class="btn-registrar">REGÍSTRATE</button>
        </div>
    </div>

    <div id="map-view">
        <div class="map-header">
            <span id="map-title">Explorando...</span>
            <button class="btn-close-map" onclick="cerrarMapa()">VOLVER</button>
        </div>
        <div id="map"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://zuknitfklgiuoipnjraj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1a25pdGZrbGdpdW9pcG5qcmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NjY4OTcsImV4cCI6MjA5MzM0Mjg5N30.aOeE9uCgGM4DA8xgUap5zqXQqYxRZG0aDa3_V1Cjuxo";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let map;
        const dialConfig = [
            { name: "Gastronomía" }, { name: "Salud y Bienestar" }, 
            { name: "Estilo y Estética" }, { name: "Hogar y Construcción" }, 
            { name: "Motor e Industria" }, { name: "Insumos y Distribución" }, 
            { name: "Indefinido" }
        ];

        async function inicializarApp() {
            const { data: categoriasDB } = await _supabase.from('categorias').select('*').eq('grupo', 'Gastronomía').order('orden', { ascending: true });
            const root = document.getElementById('dials-root');
            let rotations = new Array(7).fill(0);

            dialConfig.forEach((config, dIdx) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'dial-wrapper';
                let itemsHTML = "";
                
                for (let i = 0; i < 9; i++) {
                    const angle = i * 40;
                    let content = "";
                    let label = "PRÓXIMAMENTE";
                    
                    if (dIdx === 0 && categoriasDB && categoriasDB[i]) {
                        const item = categoriasDB[i];
                        label = item.nombre;
                        let imgUrl = item.nombre === "Panadería" ? "https://zuknitfklgiuoipnjraj.supabase.co/storage/v1/object/public/imagenes-cerk/Panaderia.jpg" : item.imagen_url;
                        content = `<img src="${imgUrl}" class="item-img" onerror="this.src='https://via.placeholder.com/150?text=Cerk'"><span class="item-text">${label}</span>`;
                    } else {
                        content = `<div style="font-size:1.3rem">📍</div><span class="item-text">PRÓXIMAMENTE</span>`;
                    }

                    // Evento click directo en la tarjeta
                    itemsHTML += `<div class="carousel__item" onclick="abrirMapa('${label}')" id="it-${dIdx}-${i}" style="transform: rotateY(${angle}deg) translateZ(185px) rotateY(-${angle}deg)">${content}</div>`;
                }

                wrapper.innerHTML = `<div class="dial-label">${config.name}</div><div class="scene"><div class="carousel" id="car-${dIdx}">${itemsHTML}</div></div>`;
                root.appendChild(wrapper);
                setupCarouselLogic(dIdx, rotations);
            });

            // Inicializar mapa (oculto)
            map = L.map('map').setView([7.767, -72.230], 13); // Centrado en San Cristóbal/Capacho por defecto
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        function abrirMapa(categoria) {
            document.getElementById('map-view').style.display = 'flex';
            document.getElementById('main-ui').style.opacity = '0';
            document.getElementById('map-title').innerText = categoria.toUpperCase();
            setTimeout(() => { map.invalidateSize(); }, 200);
        }

        function cerrarMapa() {
            document.getElementById('map-view').style.display = 'none';
            document.getElementById('main-ui').style.opacity = '1';
        }

        function setupCarouselLogic(dIdx, rotations) {
            const carousel = document.getElementById(`car-${dIdx}`);
            let startX = 0, currentRotation = 0, moved = false;
            
            carousel.addEventListener('touchstart', e => { 
                startX = e.touches[0].pageX; 
                currentRotation = rotations[dIdx]; 
                carousel.style.transition = 'none';
                moved = false;
            }, {passive: true});

            carousel.addEventListener('touchmove', e => { 
                let delta = (e.touches[0].pageX - startX) * 0.7; 
                if(Math.abs(delta) > 5) moved = true;
                updateRotation(dIdx, currentRotation + delta); 
            }, {passive: true});

            carousel.addEventListener('touchend', e => {
                if(!moved) return; // Si no se movió, deja que el click actúe
                let delta = (e.changedTouches[0].pageX - startX) * 0.7;
                rotations[dIdx] = currentRotation + Math.round(delta / 40) * 40;
                carousel.style.transition = 'transform 0.5s ease-out';
                updateRotation(dIdx, rotations[dIdx]);
            });
        }

        function updateRotation(dIdx, val) {
            const carousel = document.getElementById(`car-${dIdx}`);
            carousel.style.transform = `rotateY(${val}deg)`;
            for(let i=0; i<9; i++) {
                const el = document.getElementById(`it-${dIdx}-${i}`);
                if (!el) continue;
                const baseAngle = i * 40;
                el.style.transform = `rotateY(${baseAngle}deg) translateZ(185px) rotateY(${-baseAngle - val}deg)`;
            }
        }

        window.onload = inicializarApp;
    </script>
</body>
</html>
