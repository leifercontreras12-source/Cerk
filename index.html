<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CERK v2.1 - Precision</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #00e5ff; --dark: #050505; --card-bg: rgba(15, 15, 15, 0.98); }
        body { 
            background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding-bottom: 50px; overflow-x: hidden; touch-action: pan-y;
        }
        
        .app-container { display: flex; flex-direction: column; align-items: center; padding-top: 20px; }

        .brand {
            font-size: 2.8rem; font-weight: 900; letter-spacing: 10px;
            color: var(--primary); text-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
            margin-bottom: 25px;
        }

        .dial-wrapper {
            position: relative; width: 100%; height: 130px;
            display: flex; flex-direction: column; align-items: center;
            margin-bottom: 15px;
        }

        /* Títulos solicitados integrados al dial */
        .dial-label {
            font-size: 0.7rem; color: var(--primary); font-weight: 800;
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px;
            text-align: center; width: 100%;
        }

        .scene { 
            width: 100%; height: 75px; perspective: 1000px; 
            display: flex; justify-content: center; align-items: center;
        }

        .carousel {
            width: 130px; height: 60px; position: absolute;
            transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .carousel__item {
            position: absolute; width: 120px; height: 55px;
            background: var(--card-bg); border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 6px; display: flex; align-items: center;
            justify-content: center; font-size: 1.2rem; font-weight: bold;
            color: white; backface-visibility: hidden;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }

        /* Alineación corregida del marco Neón */
        .selection-guide {
            position: absolute; top: 22px; width: 135px; height: 62px;
            border: 2px solid var(--primary); border-radius: 8px;
            pointer-events: none; box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="brand">CERK</div>
        <div id="dials-root"></div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE
        const SUPABASE_URL = "https://zuknitfklgiuoipnjraj.supabase.co/rest/v1/"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1a25pdGZrbGdpdW9pcG5qcmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NjY4OTcsImV4cCI6MjA5MzM0Mjg5N30.aOeE9uCgGM4DA8xgUap5zqXQqYxRZG0aDa3_V1Cjuxo";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const dialNames = [
            "Gastronomía", "Salud y Bienestar", "Estilo y Estética", 
            "Hogar y Construcción", "Motor e Industria", 
            "Insumos y Distribución", "Indefinido"
        ];

        const root = document.getElementById('dials-root');
        let rotations = new Array(7).fill(0);

        dialNames.forEach((name, dIdx) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'dial-wrapper';
            
            // Creamos 9 recuadros numerados del 1 al 9
            let itemsHTML = "";
            for(let i=1; i<=9; i++) {
                itemsHTML += `<div class="carousel__item" style="transform: rotateY(${(i-1) * 40}deg) translateZ(190px)">${i}</div>`;
            }

            wrapper.innerHTML = `
                <div class="dial-label">${name}</div>
                <div class="selection-guide"></div>
                <div class="scene">
                    <div class="carousel" id="carousel-${dIdx}">
                        ${itemsHTML}
                    </div>
                </div>
            `;
            root.appendChild(wrapper);

            const carousel = wrapper.querySelector('.carousel');
            let startX = 0;
            let currentRotation = 0;
            let isMoving = false;

            // LÓGICA DE SWIPE CON SENSIBILIDAD REDUCIDA (FRENADO)
            carousel.addEventListener('touchstart', e => {
                startX = e.touches[0].pageX;
                currentRotation = rotations[dIdx];
                carousel.style.transition = 'none'; // Movimiento instantáneo con el dedo
                isMoving = true;
            });

            carousel.addEventListener('touchmove', e => {
                if(!isMoving) return;
                let diff = e.touches[0].pageX - startX;
                // Reducimos la sensibilidad multiplicando por 0.3 en lugar de 0.5
                carousel.style.transform = `rotateY(${currentRotation + diff * 0.3}deg)`;
            });

            carousel.addEventListener('touchend', e => {
                isMoving = false;
                let diff = e.changedTouches[0].pageX - startX;
                
                // Calculamos cuántos pasos de 40 grados se movió
                // Ajustamos la fuerza para que cueste más saltar de recuadro
                let moveSteps = Math.round((diff * 0.3) / 40);
                rotations[dIdx] = currentRotation + (moveSteps * 40);

                carousel.style.transition = 'transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
                carousel.style.transform = `rotateY(${rotations[dIdx]}deg)`;
            });

            // Acción de Click para futura navegación al mapa
            carousel.addEventListener('click', () => {
                const currentStep = (Math.abs(rotations[dIdx] / 40) % 9) + 1;
                alert(`Confirmado: ${name} - Opción ${currentStep}. Próximamente: Abriendo Mapa...`);
            });
        });
    </script>
</body>
</html>
