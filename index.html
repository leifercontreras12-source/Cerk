<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>+CERK v7.1 - Registro Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-base: #f4f7f9; --navy: #1a3a5f; --accent: #00b4d8; --white: #ffffff; }
        body { background: var(--bg-base); margin: 0; font-family: 'Segoe UI', sans-serif; color: var(--navy); }
        
        /* PANTALLAS */
        .screen { display: none; min-height: 100vh; width: 100%; flex-direction: column; align-items: center; }
        .active { display: flex; }

        /* INTRO ANIMADA */
        #intro-screen { background: var(--navy); color: white; justify-content: center; z-index: 9999; position: fixed; }
        .fade-out { animation: fadeOut 0.5s forwards; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }

        /* FORMULARIO ESTILO CERK */
        .form-container { width: 90%; max-width: 400px; padding: 20px 0; }
        .form-group { width: 100%; margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; color: var(--navy); }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1.5px solid #d1d9e6; border-radius: 10px; 
            font-size: 0.9rem; box-sizing: border-box; outline: none;
        }
        .gps-box { background: #eef2f7; padding: 10px; border-radius: 10px; border: 1px dashed var(--accent); text-align: center; }
        .warning { font-size: 0.65rem; color: #d63031; font-weight: bold; margin-top: 5px; display: block; }
        
        .btn-main { 
            background: var(--navy); color: white; width: 100%; padding: 15px; 
            border: none; border-radius: 40px; font-weight: 800; cursor: pointer; margin-top: 10px;
        }

        /* HEADER MAPA */
        .map-header { width: 100%; background: var(--navy); color: white; padding: 15px; display: flex; justify-content: space-between; box-sizing: border-box; }
        #map { flex: 1; width: 100%; height: 100vh; }
        
        /* ESTILOS DIALES (HEREDADOS) */
        .brand { font-family: "Brush Script MT", cursive; font-size: 2rem; margin: 10px 0; opacity: 0.6; }
        .dial-wrapper { height: 130px; margin-bottom: 5px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .scene { width: 100%; height: 85px; perspective: 1200px; display: flex; justify-content: center; }
        .carousel { width: 135px; height: 80px; position: absolute; transform-style: preserve-3d; transition: transform 0.5s ease-out; }
        .carousel__item { 
            position: absolute; width: 125px; height: 78px; background: white; border: 1.5px solid #d1d9e6; 
            border-radius: 12px; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .item-img { width: 100%; height: 70%; object-fit: cover; }
        .item-text { font-size: 0.55rem; font-weight: 900; padding: 2px; text-align: center; }
    </style>
</head>
<body>

    <div id="intro-screen" class="screen">
        <h1 style="font-family: 'Brush Script MT', cursive; font-size: 3rem;">Bienvenido a +CERK</h1>
    </div>

    <div id="main-ui" class="screen active">
        <div class="brand" style="text-align:center;"><span style="color:var(--accent); font-family:sans-serif; font-weight:900;">+</span>CERK</div>
        <div id="dials-root" style="width:100%"></div>
        <div style="padding: 20px; width: 100%; text-align: center;">
            <button class="btn-main" onclick="mostrarIntroRegistro()">REGÍSTRATE</button>
        </div>
    </div>

    <div id="register-ui" class="screen" style="background: white;">
        <div class="form-container">
            <h2 style="text-align:center; margin-bottom:20px;">Nuevo Comercio</h2>
            
            <div class="form-group">
                <label>Nombre del Comercio</label>
                <input type="text" id="reg-nombre" placeholder="Ej: Panadería El Sol">
            </div>

            <div class="form-group">
                <label>Dial Principal</label>
                <select id="sel-dial" onchange="actualizarSubcategorias()">
                    <option value="">Selecciona...</option>
                    <option value="Gastronomía">Gastronomía</option>
                    <option value="Salud y Bienestar">Salud y Bienestar</option>
                    <option value="Estilo y Estética">Estilo y Estética</option>
                </select>
            </div>

            <div class="form-group">
                <label>¿Qué tipo de negocio es?</label>
                <select id="sel-tipo">
                    <option value="">Primero elige un dial...</option>
                </select>
            </div>

            <div class="form-group">
                <label>WhatsApp</label>
                <input type="tel" id="reg-tel" placeholder="Ej: 04121234567">
            </div>

            <div class="form-group">
                <label>Horario de Trabajo</label>
                <input type="text" id="reg-horario" placeholder="Ej: 8am - 12pm / 2pm - 6pm">
            </div>

            <div class="form-group">
                <label>Fotos (Máx 3 - 1MB c/u)</label>
                <input type="file" id="reg-fotos" multiple accept="image/*">
            </div>

            <div class="form-group gps-box">
                <button type="button" onclick="obtenerGPS()" style="background:var(--accent); border:none; color:white; padding:8px; border-radius:5px; font-weight:bold;">Capturar Ubicación GPS</button>
                <span id="gps-status" style="font-size:0.7rem; display:block; margin-top:5px;">No capturada</span>
                <span class="warning">¡Hazlo desde el local físico para precisión!</span>
            </div>

            <button class="btn-main" onclick="finalizarRegistro()">ACTIVAR Y PAGAR</button>
            <button onclick="irA('main-ui')" style="background:none; border:none; color:var(--navy); width:100%; margin-top:15px; font-size:0.8rem; font-weight:bold;">VOLVER ATRÁS</button>
        </div>
    </div>

    <div id="map-view" class="screen">
        <div class="map-header">
            <span id="map-title">MAPA</span>
            <button onclick="irA('main-ui')" style="background:var(--accent); border:none; color:white; padding:5px 10px; border-radius:5px;">CERRAR</button>
        </div>
        <div id="map"></div>
    </div>

    <script>
        // CONFIG SUPABASE
        const SUPABASE_URL = "https://zuknitfklgiuoipnjraj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1a25pdGZrbGdpdW9pcG5qcmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NjY4OTcsImV4cCI6MjA5MzM0Mjg5N30.aOeE9uCgGM4DA8xgUap5zqXQqYxRZG0aDa3_V1Cjuxo";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let map, userCoords = null;
        const subcategorias = {
            "Gastronomía": ["Panadería", "Heladería", "Comida Rápida", "Restaurant", "Repostería"],
            "Salud y Bienestar": ["Farmacia", "Consultorio", "Gimnasio", "Spa"],
            "Estilo y Estética": ["Peluquería", "Barbería", "Tienda de Ropa"]
        };

        // INICIALIZAR DIALES
        async function init() {
            const root = document.getElementById('dials-root');
            const groups = ["Gastronomía", "Salud y Bienestar", "Estilo y Estética", "Hogar y Construcción"];
            
            groups.forEach((group, dIdx) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'dial-wrapper';
                let itemsHTML = "";
                for(let i=0; i<9; i++) {
                    const angle = i * 40;
                    itemsHTML += `
                        <div class="carousel__item" onclick="verMapa('${group}')" style="transform: rotateY(${angle}deg) translateZ(185px) rotateY(-${angle}deg)">
                            <div style="font-size:1.5rem">📍</div>
                            <span class="item-text">PRÓXIMAMENTE</span>
                        </div>`;
                }
                wrapper.innerHTML = `<div style="font-size:0.7rem; font-weight:800; margin-bottom:5px;">${group}</div><div class="scene"><div class="carousel" id="car-${dIdx}">${itemsHTML}</div></div>`;
                root.appendChild(wrapper);
            });
            map = L.map('map').setView([7.767, -72.230], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        function irA(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'map-view') setTimeout(() => map.invalidateSize(), 200);
        }

        function mostrarIntroRegistro() {
            const intro = document.getElementById('intro-screen');
            intro.classList.add('active');
            setTimeout(() => {
                intro.classList.add('fade-out');
                setTimeout(() => {
                    intro.classList.remove('active', 'fade-out');
                    irA('register-ui');
                }, 500);
            }, 2000);
        }

        function actualizarSubcategorias() {
            const dial = document.getElementById('sel-dial').value;
            const sub = document.getElementById('sel-tipo');
            sub.innerHTML = '<option value="">Selecciona tipo...</option>';
            if(subcategorias[dial]) {
                subcategorias[dial].forEach(s => sub.innerHTML += `<option value="${s}">${s}</option>`);
            }
        }

        function obtenerGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('gps-status').innerText = "✅ Ubicación Capturada";
                    document.getElementById('gps-status').style.color = "green";
                });
            }
        }

        async function finalizarRegistro() {
            const nombre = document.getElementById('reg-nombre').value;
            const tipo = document.getElementById('sel-tipo').value;
            if(!nombre || !tipo || !userCoords) return alert("Por favor, completa nombre, tipo y captura el GPS.");

            alert("¡OK! Ya estás registrado. Espera la confirmación de pago y revisa tu mapa!");
            
            const msg = `Hola! Acabo de registrar mi comercio: ${nombre} en la categoría ${tipo}. Solicito datos de pago.`;
            window.location.href = `https://wa.me/TUNUMEROAQUI?text=${encodeURIComponent(msg)}`;
        }

        window.onload = init;
    </script>
</body>
</html>
