        const dialConfig = [
            { name: "Gastronomía", items: ["Panadería", "Restaurante", "Fast Food", "Heladería", "Comida China", "Pizzería", "Pollo Brasa", "Cafetería", "Repostería"] },
            { name: "Salud y Bienestar", items: Array(9).fill("Próximamente") },
            { name: "Estilo y Estética", items: Array(9).fill("Próximamente") },
            { name: "Hogar y Construcción", items: Array(9).fill("Próximamente") }
        ];

        const root = document.getElementById('dials-root');
        let rotations = new Array(4).fill(0);

        dialConfig.forEach((config, dIdx) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'dial-wrapper';
            let itemsHTML = "";
            
            config.items.forEach((itemLabel, i) => {
                const angle = i * 40;
                // Si es el primer item de Gastronomía, ponemos la foto y el texto abajo
                const content = (dIdx === 0 && i === 0) 
                    ? `<img src="${imgPanaderia}" class="item-img"><span class="item-text">${itemLabel}</span>`
                    : `<div style="font-size:1.4rem; font-weight:900; margin-top:5px;">${i+1}</div><span class="item-text">${itemLabel}</span>`;
                
                itemsHTML += `<div class="carousel__item" id="item-${dIdx}-${i}" style="transform: rotateY(${angle}deg) translateZ(175px) rotateY(-${angle}deg)">${content}</div>`;
            });

            wrapper.innerHTML = `<div class="dial-label">${config.name}</div><div class="scene"><div class="carousel" id="carousel-${dIdx}">${itemsHTML}</div></div>`;
            root.appendChild(wrapper);

            const carousel = wrapper.querySelector('.carousel');
            let startX = 0, currentRotation = 0;

            const updateOrbital = (newRot) => {
                carousel.style.transform = `rotateY(${newRot}deg)`;
                for(let i=0; i<9; i++) {
                    const item = document.getElementById(`item-${dIdx}-${i}`);
                    const baseA = i * 40;
                    item.style.transform = `rotateY(${baseA}deg) translateZ(175px) rotateY(${-baseA - newRot}deg)`;
                }
            };

            carousel.addEventListener('touchstart', e => {
                startX = e.touches[0].pageX;
                currentRotation = rotations[dIdx];
                carousel.style.transition = 'none';
            });

            carousel.addEventListener('touchmove', e => {
                let diff = e.touches[0].pageX - startX;
                updateOrbital(currentRotation + diff * 0.5); 
            });

            carousel.addEventListener('touchend', e => {
                let diff = e.changedTouches[0].pageX - startX;
                let moveSteps = Math.round((diff * 0.5) / 40);
                rotations[dIdx] = currentRotation + (moveSteps * 40);
                carousel.style.transition = 'transform 0.5s cubic-bezier(0.1, 0.8, 0.2, 1)';
                updateOrbital(rotations[dIdx]);
            });
        });
    </script>
