const compressImage = (file) => {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (e) => {
      const img = new Image();
      img.src = e.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX_WIDTH = 800;
        const scaleSize = MAX_WIDTH / img.width;
        canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob((blob) => resolve(blob), 'image/webp', 0.75);
      };
    };
  });
};

// --- LOGICA DE ESTADO ABIERTO/CERRADO (SOPORTA AMBOS FORMATOS) ---
function calcularEstadoHorario(horarioStr) {
  try {
    if(!horarioStr) return `<span style='color:#7a8a99; font-weight:bold;'>🕒 HORARIO NO DEFINIDO</span>`;
    if(horarioStr.includes("24 HORAS")) return `<span style='color:#25D366; font-weight:bold;'>🟢 ABIERTO 24 HORAS</span>`;

    const now = new Date();
    const currentHour = now.getHours();
    const currentMins = now.getMinutes();
    const currentTime = currentHour + currentMins/60;

    if(horarioStr.includes("|")) {
      const dayIndex = now.getDay();
      const daysMap = ["DOM","LUN","MAR","MIE","JUE","VIE","SAB"];
      const todayStr = daysMap[dayIndex];
      
      const parts = horarioStr.split("|");
      const opsDays = parts[0];
      const opsTimes = parts[1];

      if(!opsDays.includes(todayStr)) return `<span style='color:#e63946; font-weight:bold;'>🔴 Ya cerraron 🥺</span>`;

      let openStatus = false;
      let minsToClose = Infinity;

      const slots = opsTimes.split("/");
      for(let slot of slots) {
        const [op, cl] = slot.split("-");
        if(!op || !cl) continue;
        const tOp = parseInt(op.split(":")[0]) + parseInt(op.split(":")[1])/60;
        let tCl = parseInt(cl.split(":")[0]) + parseInt(cl.split(":")[1])/60;
        if(tCl < tOp) tCl += 24;

        if(currentTime >= tOp && currentTime < tCl) {
          openStatus = true;
          minsToClose = (tCl - currentTime) * 60;
          break;
        }
      }

      if(openStatus) {
        if(minsToClose <= 10) return `<span style='color:#e63946; font-weight:bold;'>🔴 ¡Corre! Están cerrando 🏃🏻</span>`;
        if(minsToClose <= 30) return `<span style='color:#f4a261; font-weight:bold;'>🟡 ¡Apúrate que sí llegas! 🤩</span>`;
        return `<span style='color:#25D366; font-weight:bold;'>🟢 YA está abierto 😎</span>`;
      } else {
        return `<span style='color:#e63946; font-weight:bold;'>🔴 Ya cerraron 🥺</span>`;
      }
    }

    const regex = /(\d{1,2})[:.]?(\d{0,2})\s*(AM|PM)?\s*[-A]\s*(\d{1,2})[:.]?(\d{0,2})\s*(AM|PM)?/i;
    const match = horarioStr.match(regex);
    if(!match) return `<span style='color:#7a8a99; font-weight:bold;'>🕒 ${horarioStr}</span>`;

    let [ , h1, m1, p1, h2, m2, p2 ] = match;
    h1 = parseInt(h1); m1 = parseInt(m1||0);
    h2 = parseInt(h2); m2 = parseInt(m2||0);
    p1 = p1 ? p1.toUpperCase() : 'AM';
    p2 = p2 ? p2.toUpperCase() : 'PM';

    if(p1 === 'PM' && h1 !== 12) h1 += 12;
    if(p1 === 'AM' && h1 === 12) h1 = 0;
    if(p2 === 'PM' && h2 !== 12) h2 += 12;
    if(p2 === 'AM' && h2 === 12) h2 = 0;

    const openTime = h1 + m1/60;
    const closeTime = h2 + m2/60;

    let isAbierto = (closeTime > openTime) ? (currentTime >= openTime && currentTime < closeTime) : (currentTime >= openTime || currentTime < closeTime);
    
    if(isAbierto) {
      let minsLeft = (closeTime - currentTime) * 60;
      if(closeTime < openTime && currentTime >= openTime) minsLeft = (closeTime + 24 - currentTime) * 60;
      if(minsLeft <= 10) return `<span style='color:#e63946; font-weight:bold;'>🔴 ¡Corre! Están cerrando!! 🏃🏻</span>`;
      if(minsLeft <= 30) return `<span style='color:#f4a261; font-weight:bold;'>🟡 ¡Apúrate, que sí llegas! 🤩</span>`;
      return `<span style='color:#25D366; font-weight:bold;'>🟢 Ahora está abierto 😎</span>`;
    }
    return `<span style='color:#e63946; font-weight:bold;'>🔴 Ya cerraron 🥺</span>`;
    
  } catch(e) {
    return `<span style='color:#7a8a99; font-weight:bold;'>🕒 ${horarioStr}</span>`;
  }
}

// --- Trazado Inteligente de Ruta (Leaflet Routing Machine + OSRM Peatonal) ---
function trazarRuta(lat, lon) {
  if(!userCoords) { alert("GPS no activado. Intenta de nuevo."); return; }
  
  if(routingControl) {
    map.removeControl(routingControl);
  }
  
  routingControl = L.Routing.control({
    waypoints: [
      L.latLng(userCoords.lat, userCoords.lon),
      L.latLng(lat, lon)
    ],
    router: L.Routing.osrmv1({
      language: 'es',
      profile: 'foot' // Enrutamiento real peatonal por calles de OSM
    }),
    lineOptions: {
      styles: [{color: '#00b4d8', opacity: 0.8, weight: 6, dashArray: '10, 10'}]
    },
    show: false, // UI Itinerario apagada
    addWaypoints: false,
    routeWhileDragging: false,
    fitSelectedRoutes: true,
    createMarker: function() { return null; } // Evita marcadores duplicados
  }).addTo(map);
}

      <a href="https://wa.me/${c.WhatsApp}?text=Hola,%20acabo%20de%20ver%20su%20comercio%20en%20+CERK." target="_blank" onclick="prepararCalificacion('${c.Nombre}')"
         style="display:block; text-align:center; background:#25D366; color:white; padding:12px; border-radius:12px; text-decoration:none; font-weight:bold; box-shadow:0 4px 10px rgba(37,211,102,0.3); font-size:0.9rem;">
        Consulta con ellos!
      </a>
      <button onclick="trazarRuta(${c.Latitud}, ${c.Longitud})" style="display:block; width:100%; margin-top:8px; text-align:center; background:var(--navy-deep); color:white; padding:10px; border-radius:12px; border:none; font-weight:bold; font-size:0.85rem; cursor:pointer;">
        Como llego? 📍

  `;
}

// --- LÓGICA DEL CONTADOR ---
async function initContador() {
  const hoy = new Date().toISOString().split('T')[0];
  const { data } = await _supabase.from('vistas_diarias').select('*').eq('fecha', hoy).single();
  let actual = data ? data.conteo_real : 17;
  if(!data) await _supabase.from('vistas_diarias').insert({fecha: hoy, conteo_real: 17});
  else await _supabase.from('vistas_diarias').update({conteo_real: actual + 1}).eq('fecha', hoy);
  document.getElementById('count_hoy').innerHTML = `HOY<br>${Math.floor((actual+1) * 1.4)}`;
  const { data: todos } = await _supabase.from('vistas_diarias').select('conteo_real');
  const mes = todos.reduce((a, b) => a + b.conteo_real, 0);
  document.getElementById('count_mes').innerHTML = `MES<br>${Math.floor(mes * 1.4)}`;
}

// --- RECONSTRUCCIÓN DE DIALES 3D (CON FÍSICA MATEMÁTICA 0.85) ---
async function cargarDiales() {
  const root = document.getElementById('dials-root');
  const { data: catData } = await _supabase.from('categorias').select('*').order('orden', {ascending: true});
  
  categoriasConfig.forEach((catName, dIdx) => {
    const wrap = document.createElement('div');
    wrap.className = 'dial-wrapper';
    wrap.innerHTML = `<div class="dial-label">${catName}</div><div class="scene"><div class="carousel" id="car-${dIdx}"></div></div>`;
    root.appendChild(wrap);
    const car = wrap.querySelector(`#car-${dIdx}`);
    const subs = catData.filter(c => c.grupo === catName);
    
    subs.forEach((s, iIdx) => {
      const item = document.createElement('div');
      item.className = 'carousel__item';
      item.id = `it-${dIdx}-${iIdx}`;
      item.innerHTML = `<img src="${s.imagen_url}" class="item-img"><div class="item-text">${s.nombre}</div>`;
      item.onclick = () => abrirMapa(s.nombre);
      car.appendChild(item);
    });
    setupCarousel(dIdx, subs.length);
    updateRot(dIdx, 0, subs.length);
  });
}

function setupCarousel(dIdx, total) {
  const car = document.getElementById(`car-${dIdx}`); 
  let sX = 0, moved = false, isTouching = false;
  let lastX = 0, lastTime = 0, velocity = 0;
  let rafId = null;

  car.addEventListener('touchstart', e => {
    cancelAnimationFrame(rafId);
    sX = e.touches[0].pageX; lastX = sX; lastTime = Date.now();
    car.style.transition = 'none'; isTouching = true; moved = false;
  }, {passive:true});

  car.addEventListener('touchmove', e => {
    if(!isTouching) return;
    const currX = e.touches[0].pageX; const currTime = Date.now();
    const d = (currX - sX)*0.04;
    updateRot(dIdx, rotations[dIdx] + d, total);
    
    const dt = currTime - lastTime;
    if(dt > 0) velocity = (currX - lastX) / dt;
    lastX = currX; lastTime = currTime; moved = true;
  }, {passive:true});

  car.addEventListener('touchend', () => {
    isTouching = false;
    if(!moved) return;
    let currentRot = rotations[dIdx];
    let v = velocity *0.8;

    const animate = () => {
      if(Math.abs(v) > 0.1) { // Frenado progresivo
        currentRot += v; 
        v *= 0.9; // Factor de fricción matemático solicitado
        updateRot(dIdx, currentRot, total);
        rafId = requestAnimationFrame(animate);
      } else {
        // Al frenar, se ancla perfectamente en la ventana más cercana (múltiplos de 40 grados)
        rotations[dIdx] = Math.round(currentRot/40)*40;
        car.style.transition = 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)';
        updateRot(dIdx, rotations[dIdx], total);
      }
    };
    rafId = requestAnimationFrame(animate);
  });
}

function updateRot(dIdx, val, total) {
  rotations[dIdx] = val; const car = document.getElementById(`car-${dIdx}`);
  if(car) car.style.transform = `rotateY(${val}deg)`;
  for(let i=0; i<total; i++) {
    const el = document.getElementById(`it-${dIdx}-${i}`);
    if(el) el.style.transform = `rotateY(${i*40}deg) translateZ(190px) rotateY(${- (i*40) - val}deg)`;
  }
}

// --- LÓGICA RADIAL INTELIGENTE (BÚSQUEDA EN MAPA) ---
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180; const dLon = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

async function buscarCerca(tipo, radio) {
  markersLayer.clearLayers();
  if(radiusCircle) { map.removeLayer(radiusCircle); radiusCircle = null; }
  radiusCircle = L.circle([userCoords.lat, userCoords.lon], {
    radius: radio * 1000, color: 'var(--accent-blue)', fillColor: 'var(--accent-blue)', fillOpacity: 0.1, weight: 2
  }).addTo(map);

  const { data } = await _supabase.from('Comercios').select('*').eq('Tipo', tipo).eq('Pago_confirmado', true);
  if(!data || data.length === 0) {
    if(radiusCircle) map.removeLayer(radiusCircle);
    alert(`Aún no hay comercios del rubro "${tipo}" registrados en +Cerk.`);
    return;
  }
  
  const filtrados = data.filter(c => getDistance(userCoords.lat, userCoords.lon, c.Latitud, c.Longitud) <= radio);
  
  if(filtrados.length >= 1) {
    filtrados.forEach(c => L.marker([c.Latitud, c.Longitud], {icon: cerkIcon}).addTo(markersLayer).bindPopup(generarPopup(c)));
    map.fitBounds(filtrados.map(c => [c.Latitud, c.Longitud]), { padding: [50, 50] });
  } else if(radio < 1.5) {
    const proxRadio = radio === 0.3 ? 0.8 : 1.5;
    buscarCerca(tipo, proxRadio);
  } else {
    if(confirm(`No encontramos "${tipo}" a menos de 1.5km. ¿Deseas ver todos los comercios disponibles en la zona?`)) {
      if(radiusCircle) map.removeLayer(radiusCircle);
      data.forEach(c => L.marker([c.Latitud, c.Longitud], {icon: cerkIcon}).addTo(markersLayer).bindPopup(generarPopup(c)));
      map.fitBounds(data.map(c => [c.Latitud, c.Longitud]), { padding: [50, 50] });
    } else {
      if(radiusCircle) map.removeLayer(radiusCircle);
    }
  }
}

// --- SISTEMA DE VALIDACIÓN EN TIEMPO REAL (FORMULARIO) ---
function initValidacionesFormulario() {
  const wsInput = document.getElementById('reg-ws');
  const emailInput = document.getElementById('reg-email');
  const fotosInput = document.getElementById('reg-fotos');

  document.querySelectorAll('.day-btn').forEach(btn => {
    btn.addEventListener('click', () => { btn.classList.toggle('active'); checkFormValidity(); });
  });
  
  document.getElementById('break-toggle').addEventListener('change', (e) => {
    document.getElementById('break-times').style.display = e.target.checked ? 'flex' : 'none'; checkFormValidity();
  });

  wsInput.addEventListener('blur', () => {
    const v = wsInput.value.trim();
    if(v && !/^\d{10,12}$/.test(v)) { alert("El número debe tener entre 10 y 12 dígitos (Ej: 584120000000)."); wsInput.value = ''; }
    checkFormValidity();
  });

  emailInput.addEventListener('blur', () => {
    const v = emailInput.value.trim();
    if(v && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) { alert("El correo ingresado no es válido."); emailInput.value = ''; }
    checkFormValidity();
  });

  fotosInput.addEventListener('change', () => {
    const files = fotosInput.files;
    if(files.length > 0) {
      if(files.length < 2 || files.length > 3) { alert("Debes seleccionar 2 o 3 fotos exactamente."); fotosInput.value = ''; checkFormValidity(); return; }
      for(let i=0; i<files.length; i++) {
        if(files[i].size > 3145728) { alert(`La foto #${i+1} pesa más de 3MB. Por favor elige imágenes más ligeras.`); fotosInput.value = ''; checkFormValidity(); return; }
      }
    }
    checkFormValidity();
  });

  document.querySelectorAll('#reg-ui input, #reg-ui select').forEach(el => {
    el.addEventListener('input', checkFormValidity); el.addEventListener('change', checkFormValidity);
  });
}

function checkFormValidity() {
  const btn = document.getElementById('btn-activar');
  const nombre = document.getElementById('reg-nombre').value;
  const dial = document.getElementById('reg-dial').value;
  const sub = document.getElementById('reg-sub').value;
  const tipo = document.getElementById('reg-tipo').value;
  const ws = document.getElementById('reg-ws').value;
  const email = document.getElementById('reg-email').value;
  const fotos = document.getElementById('reg-fotos').files;
  const gpsCapturado = typeof regCoords !== 'undefined' && regCoords !== null;
  const acepto = document.getElementById('reg-acepto').checked;

  const days = document.querySelectorAll('.day-btn.active').length > 0;
  const op1 = document.getElementById('t-open').value;
  const cl1 = document.getElementById('t-close').value;
  const partido = document.getElementById('break-toggle').checked;
  const op2 = document.getElementById('t-open2').value;
  const cl2 = document.getElementById('t-close2').value;

  let horarioOk = days && op1 && cl1;
  if(partido && (!op2 || !cl2)) horarioOk = false;

  if(nombre && dial && sub && tipo && ws && email && horarioOk && (fotos.length >= 2 && fotos.length <= 3) && gpsCapturado && acepto) { 
    btn.disabled = false; btn.style.opacity = '1'; 
  } else { 
    btn.disabled = true; btn.style.opacity = '0.5'; 
  }
}

// --- COMPRESIÓN Y REGISTRO ---
async function procesarRegistro() {
  const btn = document.getElementById('btn-activar');
  btn.innerText = "PROCESANDO..."; btn.disabled = true; btn.style.opacity = '0.5';

  const nombreComercio = formatText(document.getElementById('reg-nombre').value).replace(/\s+/g, '_');
  const whatsappComercio = document.getElementById('reg-ws').value.trim();
  const folderPath = `${nombreComercio}-${whatsappComercio}`;
  const files = document.getElementById('reg-fotos').files;
  let fotosUrls = [];

  for (let i = 0; i < files.length; i++) {
    const compressedBlob = await compressImage(files[i]);
    const fileName = `${folderPath}/foto_${Date.now()}_${i}.jpg`;
    const { error } = await _supabase.storage.from('imagenes_comercios').upload(fileName, compressedBlob, { contentType: 'image/jpeg' });
    if (error) { alert("Error al subir fotos. Reintenta."); btn.innerText = "ACTIVAR Y PAGAR"; btn.disabled = false; btn.style.opacity = '1'; return; }
    const { data: urlData } = _supabase.storage.from('imagenes_comercios').getPublicUrl(fileName);
    fotosUrls.push(urlData.publicUrl);
  }

  const daysStr = Array.from(document.querySelectorAll('.day-btn.active')).map(el => el.dataset.day).join(',');
  const tOp1 = document.getElementById('t-open').value;
  const tCl1 = document.getElementById('t-close').value;
  const isBreak = document.getElementById('break-toggle').checked;
  let horarioFinal = `${daysStr}|${tOp1}-${tCl1}`;
  if(isBreak) {
    const tOp2 = document.getElementById('t-open2').value;
    const tCl2 = document.getElementById('t-close2').value;
    horarioFinal = `${daysStr}|${tOp1}-${tCl1}/${tOp2}-${tCl2}`;
  }

  const payload = {
    Nombre: formatText(document.getElementById('reg-nombre').value),
    Dial: formatText(document.getElementById('reg-dial').value),
    Tipo: formatText(document.getElementById('reg-tipo').value),
    WhatsApp: document.getElementById('reg-ws').value.trim(),
    Latitud: regCoords.lat,
    Longitud: regCoords.lon,
    Email_propietario: document.getElementById('reg-email').value.trim().toLowerCase(),
    Horario: horarioFinal,
    Fotos_urls: fotosUrls,
    Pago_confirmado: false,
    Acepto_terminos: "ACEPTADO"
  };

  const { error } = await _supabase.from('Comercios').insert(payload);

  if(!error) {
    document.querySelectorAll('#reg-ui input[type="text"], #reg-ui input[type="tel"], #reg-ui input[type="email"], #reg-ui input[type="time"], #reg-ui input[type="file"]').forEach(el => el.value = '');
    document.querySelectorAll('.day-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('break-toggle').checked = false;
    document.getElementById('break-times').style.display = 'none';
    document.getElementById('reg-acepto').checked = false;
    document.getElementById('reg-sub').innerHTML = '<select disabled></select>';
    document.getElementById('reg-tipo').innerHTML = '<select disabled></select>';
    
    const btnGps = document.getElementById('btn-gps');
    if(btnGps) { 
      btnGps.style.background = '#e0f7fa'; btnGps.style.color = '#173b66'; btnGps.style.border = '2px dashed #173b66';
      btnGps.innerHTML = `Capturar GPS <br><span style="color:#e63946; font-size:0.75rem; display:block; margin-top:5px;">¡Hazlo desde el local físico para precisión!</span>`;
    }
    regCoords = null;
    btn.innerText = "ACTIVAR Y PAGAR";
    irA('main-ui');
    window.location.href = `https://wa.me/584247573426?text=Hola,%20acabo%20de%20registrar%20mi%20comercio:%20${payload.Nombre}.%20Solicito%20activacion.`;
  } else {
    alert("Error de red. Intenta nuevamente."); btn.innerText = "ACTIVAR Y PAGAR"; btn.disabled = false; btn.style.opacity = '1';
  }
}

// --- NAVEGACIÓN Y SOPORTE ---
async function abrirMapa(subNombre) {
  irA('map-view'); document.getElementById('map-title').innerText = subNombre;
  const { data } = await _supabase.from('categorias').select('busqueda').eq('nombre', subNombre).single();
  const container = document.getElementById('filter-container');
  container.innerHTML = '';
  if(data && data.busqueda) {
    data.busqueda.split(',').forEach(tipo => {
      const b = document.createElement('button'); b.className = 'globito'; b.innerText = tipo.trim();
      b.onclick = () => buscarCerca(tipo.trim(), 0.3);
      container.appendChild(b);
    });
  }
}

function irA(id) {
  if(id === 'main-ui') {
    if(markersLayer) markersLayer.clearLayers();
    if(radiusCircle) { map.removeLayer(radiusCircle); radiusCircle = null; }
    if(routingControl) { map.removeControl(routingControl); routingControl = null; }
    document.getElementById('filter-container').innerHTML = '';
    document.getElementById('map-title').innerText = 'MAPA';
  }
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  
  if(id==='map-view') {
    setTimeout(() => {
      map.invalidateSize();
      if(userCoords) map.setView([userCoords.lat, userCoords.lon], 14);
    }, 300);
  }
}

function mostrarRegistro() { 
  const w = document.getElementById('welcome-screen');
  w.style.display='flex'; 
  w.innerHTML = `<div style="position:absolute; bottom:15%; left:10%; font-family: 'Georgia', serif; font-style: italic; font-size: 2.5rem; color: white;">Bienvenido a +CERK</div>`;
  setTimeout(() => { 
    w.classList.add('fade-out'); 
    irA('reg-ui'); 
    setTimeout(() => { w.style.display='none'; w.classList.remove('fade-out'); }, 600);
  }, 1600); 
}

function capturarGPS() {
  navigator.geolocation.getCurrentPosition(p => {
    regCoords = {lat: p.coords.latitude, lon: p.coords.longitude};
    const btnGps = document.getElementById('btn-gps');
    if(btnGps) {
      btnGps.style.background = '#25D366'; btnGps.style.color = 'white'; btnGps.style.border = '2px solid #25D366';
      btnGps.innerHTML = 'UBICACIÓN REGISTRADA ✓';
    }
    checkFormValidity();
  });
}

function popularSelectCategorias() { 
  const s = document.getElementById('reg-dial');
  categoriasConfig.forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`); 
}

async function actualizarSubcategorias() {
  const cat = document.getElementById('reg-dial').value; const sub = document.getElementById('reg-sub'); const tipo = document.getElementById('reg-tipo');
  sub.innerHTML = '<option value="">Cargando...</option>'; tipo.innerHTML = '<option value="">Selecciona...</option>'; tipo.disabled = true;

  const { data } = await _supabase.from('categorias').select('nombre').eq('grupo', cat);

  sub.disabled = false; checkFormValidity();
}

async function actualizarSubdivisiones() {
  const subNombre = document.getElementById('reg-sub').value; const tipo = document.getElementById('reg-tipo');
  tipo.innerHTML = '<option value="">Cargando...</option>';
  if(!subNombre) { tipo.disabled = true; checkFormValidity(); return; }
  const { data } = await _supabase.from('categorias').select('busqueda').eq('nombre', subNombre).single();
  tipo.innerHTML = '<option value="">Selecciona...</option>';
  if(data && data.busqueda) { data.busqueda.split(',').forEach(t => tipo.innerHTML += `<option value="${t.trim()}">${t.trim()}</option>`); tipo.disabled = false; }

}

  if (document.visibilityState === 'hidden') {
    if (comercioPendienteCalificar) ratingActivado = true;
  }
  if (document.visibilityState === 'visible' && comercioPendienteCalificar && ratingActivado) {
    setTimeout(() => {
      document.getElementById('rating-modal').style.display = 'flex';
    }, 500); // Pequeño delay de transición para mostrar el popup al volver a la app
  }
});

function cerrarModalCalificacion() {
  document.getElementById('rating-modal').style.display = 'none';
  comercioPendienteCalificar = null;
  ratingActivado = false;
}

async function enviarCalificacion(estrellas) {
  document.getElementById('rating-modal').style.display = 'none';
  if(comercioPendienteCalificar) {
    try {
      await _supabase.from('calificaciones').insert({ estrellas: estrellas });
    } catch(e) {}
    comercioPendienteCalificar = null;
    ratingActivado = false;
  }
}

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  setTimeout(() => {
    const splash = document.getElementById('splash-screen');
    splash.classList.add('fade-out');
    setTimeout(() => splash.style.display = 'none', 500);
  }, 800); 
};
