<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CERK v2.4 - Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #00b4d8; 
            --bg-light: #f4f6f8; 
            --card-bg: rgba(255, 255, 255, 0.95);
        }
        
        body { 
            background-color: var(--bg-light);
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10h80v80h-80z' fill='none' stroke='%23000' stroke-opacity='0.03'/%3E%3Cpath d='M0 50h100M50 0v100' fill='none' stroke='%23000' stroke-opacity='0.03'/%3E%3C/svg%3E");
            color: #333; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding-bottom: 120px; overflow-x: hidden; touch-action: pan-y;
        }
        
        .app-container { display: flex; flex-direction: column; align-items: center; padding-top: 20px; }

        .brand {
            font-size: 3rem; font-weight: 900; letter-spacing: 12px;
            color: #1a3a5f; text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .dial-wrapper {
            position: relative; width: 100%; height: 160px;
            display: flex; flex-direction: column; align-items: center;
            margin-bottom: 30px;
        }

        .dial-label {
            font-size: 0.85rem; color: #1a3a5f; font-weight: 800;
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px;
        }

        .scene { 
            width: 100%; height: 100px; perspective: 1200px; 
            display: flex; justify-content: center; align-items: center;
        }

        .carousel { width: 140px; height: 70px; position: absolute; transform-style: preserve-3d; }

        .carousel__item {
            position: absolute; width: 130px; height: 65px;
            background: var(--card-bg); border: 1.5px solid #d1d9e6;
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; font-size: 1.8rem; font-weight: 900;
            color: #1a3a5f; box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            backface-visibility: hidden; 
        }

        .selection-guide {
            position: absolute; top: 48px; width: 136px; height: 71px;
            border: 4px solid var(--primary); border-radius: 14px;
            pointer-events: none; box-shadow: 0 0 20px rgba(0, 180, 216, 0.3);
            z-index: 100;
        }

        .footer-cta {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: white; padding: 25px 0; text-align: center;
            border-top: 1px solid #e0e0e0; z-index: 1000;
        }
        .footer-cta p { margin: 0; font-size: 0.9rem; color: #555; }
        .btn-registrar {
            background: #1a3a5f; color: white; border: none;
            padding: 8px 20px; border-radius: 30px; font-weight: bold;
            margin-left: 12px; cursor: pointer; text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="brand">CERK</div>
        <div id="dials-root"></div>
    </div>

    <div class="footer-cta">
        <p>¿Quieres formar parte de nuestro equipo? 
            <a href="#" class="btn-registrar" onclick="alert('Registro próximamente...')">REGÍSTRATE</a>
        </p>
    </div>

    <script>
        // AQUÍ ESTÁN LAS LÍNEAS QUE BUSCABAS:
        const SUPABASE_URL = "https://zuknitfklgiuoipnjraj.supabase.co/rest/v1/"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1a25pdGZrbGdpdW9pcG5qcmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NjY4OTcsImV4cCI6MjA5MzM0Mjg5N30.aOeE9uCgGM4DA8xgUap5zqXQqYxRZG0aDa3_V1Cjuxo";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const dialNames = ["Gastronomía", "Salud y Bienestar", "Estilo y Estética", "Hogar y Construcción", "Motor e Industria", "Insumos y Distribución", "Indefinido"];
        const root = document.getElementById('dials-root');
        let rotations = new Array(7).fill(0);

        dialNames.forEach((name, dIdx) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'dial-wrapper';
            let itemsHTML = "";
            for(let i=1; i<=9; i++) {
                const angle = (i-1) * 40;
                itemsHTML += `<div class="carousel__item" id="item-${dIdx}-${i-1}" style="transform: rotateY(${angle}deg) translateZ(210px) rotateY(-${angle}deg)">${i}</div>`;
            }
            wrapper.innerHTML = `<div class="dial-label">${name}</div><div class="selection-guide"></div><div class="scene"><div class="carousel" id="carousel-${dIdx}">${itemsHTML}</div></div>`;
            root.appendChild(wrapper);

            const carousel = wrapper.querySelector('.carousel');
            let startX = 0, currentRotation = 0;

            const updateOrbital = (newRot) => {
                carousel.style.transform = `rotateY(${newRot}deg)`;
                for(let i=0; i<9; i++) {
                    const item = document.getElementById(`item-${dIdx}-${i}`);
                    const baseA = i * 40;
                    item.style.transform = `rotateY(${baseA}deg) translateZ(210px) rotateY(${-baseA - newRot}deg)`;
                }
            };

            carousel.addEventListener('touchstart', e => {
                startX = e.touches[0].pageX;
                currentRotation = rotations[dIdx];
                carousel.style.transition = 'none';
                for(let i=0; i<9; i++) document.getElementById(`item-${dIdx}-${i}`).style.transition = 'none';
            });

            carousel.addEventListener('touchmove', e => {
                let diff = e.touches[0].pageX - startX;
                updateOrbital(currentRotation + diff * 0.4);
            });

            carousel.addEventListener('touchend', e => {
                let diff = e.changedTouches[0].pageX - startX;
                let moveSteps = Math.round((diff * 0.4) / 40);
                rotations[dIdx] = currentRotation + (moveSteps * 40);
                const anim = 'transform 0.5s cubic-bezier(0.1, 0.8, 0.2, 1)';
                carousel.style.transition = anim;
                for(let i=0; i<9; i++) document.getElementById(`item-${dIdx}-${i}`).style.transition = anim;
                updateOrbital(rotations[dIdx]);
            });

            carousel.addEventListener('click', () => {
                const index = (Math.round(-rotations[dIdx] / 40) % 9 + 9) % 9;
                alert(`Seleccionado: ${name} - Opción ${index + 1}`);
            });
        });
    </script>
</body>
</html>
