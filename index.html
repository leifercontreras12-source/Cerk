<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CERK v2.8 - San Cristóbal Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg-base: #eef1f4;
            --navy: #1a3a5f;
            --accent: #00b4d8;
        }
        
        body { 
            background-color: var(--bg-base);
            /* Capa de OpenStreetMap Estilizada de San Cristóbal */
            background-image: 
                radial-gradient(circle, rgba(238,241,244,0.2) 0%, rgba(238,241,244,0.9) 80%),
                url("https://static-maps.yandex.ru/1.x/?lang=en_US&ll=-72.2250,7.7667&z=14&l=map&size=600,600&style=element:geometry|color:0xf5f5f5&style=element:labels|visibility:off");
            background-attachment: fixed;
            background-size: cover;
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; 
            color: var(--navy); overflow-x: hidden; touch-action: pan-y;
            padding-bottom: 140px;
        }
        
        .app-container { display: flex; flex-direction: column; align-items: center; padding-top: 25px; }
        .brand { font-size: 3rem; font-weight: 900; letter-spacing: 12px; margin-bottom: 30px; text-shadow: 2px 2px 8px rgba(0,0,0,0.1); }

        .dial-wrapper {
            position: relative; width: 100%; height: 150px;
            display: flex; flex-direction: column; align-items: center;
            margin-bottom: 35px;
        }

        .dial-label { 
            font-size: 0.85rem; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 3px; margin-bottom: 15px; 
            background: rgba(255,255,255,0.6); padding: 2px 12px; border-radius: 10px;
        }

        .scene { width: 100%; height: 80px; perspective: 1200px; display: flex; justify-content: center; align-items: center; }
        .carousel { width: 140px; height: 65px; position: absolute; transform-style: preserve-3d; }

        .carousel__item {
            position: absolute; width: 130px; height: 62px;
            background: rgba(255, 255, 255, 0.98); border: 1px solid #cfd9e1;
            border-radius: 14px; display: flex; align-items: center;
            justify-content: center; font-size: 1.9rem; font-weight: 900;
            color: var(--navy); box-shadow: 0 6px 15px rgba(0,0,0,0.08); 
            backface-visibility: hidden; transition: transform 0.5s ease-out;
        }

        .footer-cta {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(255,255,255,0.97); padding: 25px 0; text-align: center;
            border-top: 1px solid #d1d9e6; z-index: 1000; backdrop-filter: blur(10px);
        }
        .btn-registrar {
            background: var(--navy); color: white; border: none;
            padding: 10px 28px; border-radius: 30px; font-weight: bold;
            margin-top: 10px; cursor: pointer; display: inline-block; text-decoration: none;
            box-shadow: 0 4px 15px rgba(26, 58, 95, 0.3);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="brand">CERK</div>
        <div id="dials-root"></div>
    </div>

    <div class="footer-cta">
        <p style="margin:0; font-weight:600; font-size:0.9rem;">¿Quieres formar parte de nuestro equipo?</p>
        <a href="#" class="btn-registrar" onclick="alert('Módulo de registro en construcción')">REGÍSTRATE</a>
    </div>

    <script>
        // --- CONFIGURACIÓN SUPABASE ---
        const SUPABASE_URL = "https://zuknitfklgiuoipnjraj.supabase.co/rest/v1/"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1a25pdGZrbGdpdW9pcG5qcmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NjY4OTcsImV4cCI6MjA5MzM0Mjg5N30.aOeE9uCgGM4DA8xgUap5zqXQqYxRZG0aDa3_V1Cjuxo";
        // ------------------------------
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const dialNames = ["Gastronomía", "Salud y Bienestar", "Estilo y Estética", "Hogar y Construcción", "Motor e Industria", "Insumos y Distribución", "Indefinido"];
        const root = document.getElementById('dials-root');
        let rotations = new Array(7).fill(0);

        dialNames.forEach((name, dIdx) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'dial-wrapper';
            let itemsHTML = "";
            for(let i=1; i<=9; i++) {
                const angle = (i-1) * 40;
                itemsHTML += `<div class="carousel__item" id="item-${dIdx}-${i-1}" style="transform: rotateY(${angle}deg) translateZ(210px) rotateY(-${angle}deg)">${i}</div>`;
            }
            wrapper.innerHTML = `<div class="dial-label">${name}</div><div class="scene"><div class="carousel" id="carousel-${dIdx}">${itemsHTML}</div></div>`;
            root.appendChild(wrapper);

            const carousel = wrapper.querySelector('.carousel');
            let startX = 0, currentRotation = 0;

            const updateOrbital = (newRot) => {
                carousel.style.transform = `rotateY(${newRot}deg)`;
                for(let i=0; i<9; i++) {
                    const item = document.getElementById(`item-${dIdx}-${i}`);
                    const baseA = i * 40;
                    item.style.transform = `rotateY(${baseA}deg) translateZ(210px) rotateY(${-baseA - newRot}deg)`;
                }
            };

            carousel.addEventListener('touchstart', e => {
                startX = e.touches[0].pageX;
                currentRotation = rotations[dIdx];
                carousel.style.transition = 'none';
                for(let i=0; i<9; i++) document.getElementById(`item-${dIdx}-${i}`).style.transition = 'none';
            });

            carousel.addEventListener('touchmove', e => {
                let diff = e.touches[0].pageX - startX;
                updateOrbital(currentRotation + diff * 0.45); 
            });

            carousel.addEventListener('touchend', e => {
                let diff = e.changedTouches[0].pageX - startX;
                let moveSteps = Math.round((diff * 0.45) / 40);
                rotations[dIdx] = currentRotation + (moveSteps * 40);
                
                const anim = 'transform 0.6s cubic-bezier(0.1, 0.8, 0.2, 1)';
                carousel.style.transition = anim;
                for(let i=0; i<9; i++) document.getElementById(`item-${dIdx}-${i}`).style.transition = anim;
                updateOrbital(rotations[dIdx]);
            });

            carousel.addEventListener('click', () => {
                const index = (Math.round(-rotations[dIdx] / 40) % 9 + 9) % 9;
                alert(`CERK San Cristóbal: Buscando ${name} - Categoría ${index + 1}`);
            });
        });
    </script>
</body>
</html>
