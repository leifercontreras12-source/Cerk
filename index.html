<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>+CERK</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-base: #f4f7f9; --navy: #1a3a5f; --accent: #00b4d8; --white: #ffffff; }
        body { background-image: linear-gradient(rgba(255,255,255,0.82), rgba(255,255,255,0.82)), url('1778466671825 (1).webp'); background-size: cover; background-position: center; background-attachment: fixed; margin: 0; overflow-x: hidden; width: 100vw; position: relative; }
        .screen { display: none; min-height: 100vh; width: 100%; flex-direction: column; align-items: center; }
        .active { display: flex; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('1778466671825 (1).webp'); background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease-out; }
        .fade-out { opacity: 0; pointer-events: none; }
        .brand { font-family: "Brush Script MT", cursive; font-size: 1.8rem; margin-top: 5px; margin-bottom: 8px; opacity: 0.5; text-align: center; background: white; width: 100%; height: 70px; display: flex; justify-content: center; align-items: center; position: relative; }
        .dial-wrapper { width: 100%; height: 135px; display: flex; flex-direction: column; align-items: center; margin-bottom: 2px; }
        .dial-label { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; opacity: 0.9; z-index: 10; }
        .scene { width: 100%; height: 88px; perspective: 1200px; display: flex; justify-content: center; }
        .carousel { width: 135px; height: 82px; position: absolute; transform-style: preserve-3d; transition: transform 0.5s ease-out; }
        .carousel__item { position: absolute; width: 125px; height: 80px; background: white; border: 1.5px solid #d1d9e6; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(26, 58, 95, 0.06); backface-visibility: hidden; overflow: hidden; }
        .item-img { width: 100%; height: 74%; object-fit: cover; border-bottom: 1px solid #f0f0f0; }
        .item-text { font-size: 0.56rem; font-weight: 900; margin: 2px 1px; text-transform: uppercase; text-align: center; }
        .form-container { width: 92%; max-width: 400px; background: white; border-radius: 25px; margin: 20px auto; padding: 25px; box-sizing: border-box; box-shadow: 0 15px 35px rgba(26, 58, 95, 0.15); }
        .map-header { width: 100%; background: var(--navy); color: white; padding: 15px; display: flex; justify-content: space-between; box-sizing: border-box; z-index: 1000; }
        #map { flex: 1; width: 100%; height: 100vh; }
        .filter-bar { width: 100%; background: white; overflow-x: auto; display: flex; gap: 10px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); white-space: nowrap; }
        .globito { background: var(--accent); color: white; padding: 8px 15px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; border: none; }
    </style>
</head>
<body>

<div id="splash-screen">
  <img src="1778462340724 (1).png" alt="Logo" style="width:240px; height:auto;">
</div>

<div id="main-ui" class="screen active">
    <div class="brand">
        <div id="count_hoy" style="position: absolute; left: 15px; text-align: center;"></div>
        <div style="font-family: 'Georgia', serif; font-style: italic; font-size: 2.1rem; display: flex; align-items: center; letter-spacing: -1px;">
            <span style="color: #40E0D0; font-weight: bold;">+</span><span style="color: #7a8a99;">Cerk</span>
        </div>
        <div id="count_mes" style="position: absolute; right: 15px; text-align: center;"></div>
    </div>
    <div id="dials-root" style="width: 100%;"></div>
    <div class="footer-cta">
        <button class="btn-main" onclick="mostrarIntroRegistro()">REGÍSTRATE</button>
    </div>
</div>

<div id="map-view" class="screen">
    <div class="map-header">
        <span id="map-title">MAPA</span>
        <button onclick="irA('main-ui')" style="background:var(--accent); border:none; color:white; padding:5px 10px; border-radius:5px;">CERRAR</button>
    </div>
    <div id="filter-container" class="filter-bar"></div>
    <div id="map"></div>
</div>

<script>
    // 1. VARIABLES GLOBALES (ESTABILIZACIÓN)
    const SUPABASE_URL = "https://zuknitfklgiuoipnjraj.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1a25pdGZrbGdpdW9pcG5qcmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NjY4OTcsImV4cCI6MjA5MzM0Mjg5N30.aOeE9uCgGM4DA8xgUap5zqXQqYxRZG0aDa3_V1Cjuxo";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let map, markersLayer, userCoords;
    let rotations = new Array(10).fill(0);

    // 2. CONFIGURACIÓN DE DATOS
    const dialConfig = [
        { name: "GASTRONOMIA" }, { name: "SALUD Y BIENESTAR" }, { name: "ESTILO Y BELLEZA" },
        { name: "HOGAR Y CONSTRUCCION" }, { name: "AUTOMOTRIZ" }, { name: "DIESEL E INDUSTRIA" },
        { name: "INSUMOS Y DISTRIBUCION" }, { name: "TECNOLOGIA Y COMUNICACION" }, { name: "SERVICIOS Y LOGISTICA" }, { name: "EXCLUSIVO" }
    ];

    const subcategorias = {
        "GASTRONOMIA": ["PANADERIA", "HELADERIA", "RESTAURANT", "COMIDA RAPIDA", "PIZZERIA", "CAFETERIA", "BODEGON Y LICORES", "MINI MARKETS", "FRIGORIFICO"],
        "SALUD Y BIENESTAR": ["FARMACIA", "CONSULTORIO CLINICO", "OPTICA Y AUDICION", "LAB CLINICO", "MATERNO INFANTIL", "IMAGENOLOGIA", "CLINICA DENTAL", "TERAPIA", "VIDA SANA"],
        "ESTILO Y BELLEZA": ["SALON DE BELLEZA", "ESTETICA", "ROPA Y CALZADO", "PERFUMERIA Y COSMETICOS", "BOUTIQUE", "DEPORTE Y FITNESS", "ATELIER", "LAVANDERIA Y TINTORERIA", "TATUAJES Y PIERCINGS"],
        "HOGAR Y CONSTRUCCION": ["FERRETERIA", "MOBILIARIO", "ELECTRODOMESTICOS", "ACABADOS", "CARPINTERIA", "TEXTILES", "PET Y AGRO", "MAQUINARIA", "PROXIMAMENTE"],
        "AUTOMOTRIZ": ["MANTENIMIENTO RAPIDO", "MOTOR", "ELECTR Y SONIDO", "TRANSMISION Y DIFF", "TREN DELANTERO", "REFRIGERACION", "SILENCIADOR Y ESCAPE", "ESTETICA", "MUNDO MOTO"],
        "DIESEL E INDUSTRIA": ["LAB DIESEL", "MEC PESADA", "METALMECANICA", "HIDRAULICA", "SIS AIRE", "AMARILLAS Y AGRO", "ELECTROAUTO 24V", "TRANSMISION Y EJES", "REPUESTOS DIESEL"],
        "INSUMOS Y DISTRIBUCION": ["PAPELERIA", "PLASTICOS Y BOLSAS", "INSUMOS DE REPOSTERIA", "QUIMICOS", "GAS A PRESION", "FERRETORNILLOS", "MAYORISTA", "DISTRIBUIDORA", "SEGURIDAD"],
        "TECNOLOGIA Y COMUNICACION": ["DISP MOVILES", "EQUIPOS DE OFICINA", "SEGURIDAD Y VIGILANCIA", "IMPRENTA", "MUSICA", "TELECOMUNICACION", "GAMING", "FOTO STUDIO", "REDES Y CONECTIVIDAD"],
        "SERVICIOS Y LOGISTICA": ["ENVIOS", "AGENCIA DE TURISMO", "AGENCIA DE FESTEJO", "REFRIGERACION", "TECNICOS A DOMICILIO", "VIGILANCIA PRIVADA", "LIC Y PROFESIONALES", "TRANSPORTE", "VARIOS"],
        "EXCLUSIVO": ["REGALOS Y DETALLES", "FLORISTERIA", "JUGUETERIA", "INSUMOS PARA DEPORTE", "HOBBY", "JUEGOS", "LOTERIA", "TIENDA PARA ADULTOS", "AVENTURA Y RECREACION"]
    };

    // 3. INICIALIZACIÓN
    async function inicializarApp() {
        gestionarVisitas();
        renderizarDiales();
        
        map = L.map('map').setView([7.767, -72.230], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        markersLayer = L.layerGroup().addTo(map);

        setTimeout(() => {
            const s = document.getElementById('splash-screen');
            if(s) { s.classList.add('fade-out'); setTimeout(() => s.style.display = 'none', 500); }
        }, 800);
    }

    function renderizarDiales() {
        const root = document.getElementById('dials-root');
        root.innerHTML = '';
        dialConfig.forEach((dial, dIdx) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'dial-wrapper';
            wrapper.innerHTML = `
                <div class="dial-label">${dIdx + 1}. ${dial.name}</div>
                <div class="scene"><div class="carousel" id="car-${dIdx}"></div></div>
            `;
            root.appendChild(wrapper);
            const car = wrapper.querySelector(`#car-${dIdx}`);
            const items = subcategorias[dial.name] || [];
            items.forEach((sub, iIdx) => {
                const item = document.createElement('div');
                item.className = 'carousel__item';
                item.id = `it-${dIdx}-${iIdx}`;
                item.innerHTML = `<div class="item-text">${sub}</div>`;
                item.onclick = () => verMapa(sub);
                car.appendChild(item);
            });
            setupCarouselLogic(dIdx);
            updateRot(dIdx, 0);
        });
    }

    // 4. LÓGICA DEL EMISOR Y RECEPTOR (MAPA)
    async function verMapa(subcategoriaElegida) {
        document.getElementById('map-title').innerText = subcategoriaElegida;
        localStorage.setItem('subcategoria_seleccionada', subcategoriaElegida);
        irA('map-view');
        prepararFiltrosMapa(subcategoriaElegida);
    }

    async function prepararFiltrosMapa(nombreSub) {
        const container = document.getElementById('filter-container');
        container.innerHTML = '<span>Cargando filtros...</span>';

        const { data, error } = await _supabase.from('categorias').select('busqueda').eq('nombre', nombreSub).single();

        if (!error && data && data.busqueda) {
            container.innerHTML = '';
            const opciones = data.busqueda.split(',');
            opciones.forEach(op => {
                const btn = document.createElement('button');
                btn.className = 'globito';
                btn.innerText = op.trim();
                btn.onclick = () => buscarComerciosPorTipo(op.trim());
                container.appendChild(btn);
            });
        } else {
            container.innerHTML = '<span>No hay subdivisiones</span>';
        }
    }

    async function buscarComerciosPorTipo(tipoEspecífico) {
        markersLayer.clearLayers();
        const { data, error } = await _supabase.from('Comercios').select('*').eq('Tipo', tipoEspecífico).eq('Pago_confirmado', true);

        if (!error && data.length > 0) {
            data.forEach(c => {
                L.marker([c.Latitud, c.Longitud]).addTo(markersLayer).bindPopup(`<b>${c.Nombre}</b><br>${c.WhatsApp}`);
            });
            const coords = data.map(c => [c.Latitud, c.Longitud]);
            map.fitBounds(coords);
        } else {
            alert("No se encontraron comercios activos en este rubro.");
        }
    }

    // 5. UTILIDADES (GPS, NAVEGACIÓN, DIALES)
    function irA(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'map-view' && map) setTimeout(() => map.invalidateSize(), 200);
    }

    function setupCarouselLogic(dIdx) {
        const car = document.getElementById(`car-${dIdx}`);
        let startX = 0, currentRot = 0, moved = false;
        car.addEventListener('touchstart', e => { startX = e.touches[0].pageX; currentRot = rotations[dIdx]; car.style.transition = 'none'; moved = false; }, {passive: true});
        car.addEventListener('touchmove', e => { 
            let delta = (e.touches[0].pageX - startX) * 0.7; 
            if(Math.abs(delta) > 5) moved = true;
            updateRot(dIdx, currentRot + delta); 
        }, {passive: true});
        car.addEventListener('touchend', () => {
            if(!moved) return;
            rotations[dIdx] = Math.round(rotations[dIdx] / 40) * 40;
            car.style.transition = 'transform 0.5s ease-out';
            updateRot(dIdx, rotations[dIdx]);
        });
    }

    function updateRot(dIdx, val) {
        rotations[dIdx] = val;
        const car = document.getElementById(`car-${dIdx}`);
        if(car) car.style.transform = `rotateY(${val}deg)`;
        for(let i=0; i<9; i++) {
            const el = document.getElementById(`it-${dIdx}-${i}`);
            if (el) {
                const base = i * 40;
                el.style.transform = `rotateY(${base}deg) translateZ(185px) rotateY(${-base - val}deg)`;
            }
        }
    }

    async function gestionarVisitas() { /* Tu lógica de contador aquí se mantiene igual */ }

    window.onload = inicializarApp;
</script>
</body>
</html>
