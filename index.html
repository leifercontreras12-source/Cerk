<!DOCTYPE html>
<html lang="es">
<head>

    <style>
        :root {

        body { 
            background-color: var(--bg-base);

            background-image: 
                radial-gradient(circle at center, rgba(244,247,249,0.2) 0%, rgba(244,247,249,0.98) 100%),
                url("data:image/svg+xml;base64,CjxzdmcgeG1sbnM9J2h0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnJyB3aWR0aD0nODAwJyBoZWlnaHQ9JzgwMCcgdmlld0JveD0nMCAwIDgwMCA4MDAnPgogICAgPHJlY3Qgd2lkdGg9JzgwMCcgaGVpZ2h0PSc4MDAnIGZpbGw9JyNmNGY3ZjknLz4KICAgIDxnIHN0cm9rZT0nIzFhM2E1Zicgc3Ryb2tlLXdpZHRoPScxLjInIHN0cm9rZS1vcGFjaXR5PScwLjA4JyBmaWxsPSdub25lJz4KICAgICAgICA8cGF0aCBkPSdNMCAxNTAgTDgwMCAxNTAgTTAgNDUwIEw4MDAgNDUwIE0xNTAgMCBMMTUwIDgwMCBNNTUwIDAgTDU1MCA4MDAnLz4KICAgICAgICA8cGF0aCBkPSdNMCAwIEw4MDAgNjAwIE04MDAgMCBMMCA4MDAgTTMwMCAwIEw4MDAgNTAwIE0wIDMwMCBMNTAwIDgwMCcvPgogICAgPC9nPgo8L3N2Zz4=");
            background-attachment: fixed;
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: var(--navy); overflow-x: hidden;
        }
        
        .app-container { display: flex; flex-direction: column; align-items: center; padding: 20px 10px; min-height: 100vh; }
        
        /* LOGO CON PESO Y BORDE GRUESO */
        .brand { 
            font-family: "Brush Script MT", cursive; font-size: 4.5rem; margin-bottom: 5px; color: var(--navy);
            text-shadow: 1.5px 1.5px 0 var(--navy), -1.5px -1.5px 0 var(--navy), 1.5px -1.5px 0 var(--navy), -1.5px 1.5px 0 var(--navy);
            -webkit-text-stroke: 2px var(--navy); text-align: center; width: 100%;
        }
        .brand span { color: var(--accent); font-family: sans-serif; font-weight: 900; margin-right: -10px; -webkit-text-stroke: 0; text-shadow: none; }

        /* ESTILO DE LOS DIALES */
        .dial-wrapper { width: 100%; height: 140px; display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; }
        .dial-label { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2.5px; margin-bottom: 15px; color: var(--navy); opacity: 0.9; }

        .scene { width: 100%; height: 85px; perspective: 1200px; display: flex; justify-content: center; }
        .carousel { width: 130px; height: 75px; position: absolute; transform-style: preserve-3d; }

        .carousel__item {
            position: absolute; width: 115px; height: 72px; background: white; 
            border: 1.5px solid #d1d9e6; border-radius: 14px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 6px 15px rgba(26, 58, 95, 0.1); backface-visibility: hidden; overflow: hidden;
        }

        .item-img { width: 100%; height: 75%; object-fit: cover; border-bottom: 1px solid #f0f0f0; }
        .item-text { font-size: 0.6rem; font-weight: 900; color: var(--navy); margin: 4px 0; text-transform: uppercase; }

        /* FOOTER REGISTRO */
        .footer-cta { width: 100%; background: white; padding: 35px 20px; text-align: center; border-top: 1px solid #e0e0e0; margin-top: auto; box-shadow: 0 -5px 20px rgba(0,0,0,0.04); }
        .btn-registrar { 
            background: var(--navy); color: white; padding: 14px 40px; border-radius: 40px; 
            font-weight: 800; border: none; font-size: 1rem; cursor: pointer; transition: transform 0.2s;
        }
        .btn-registrar:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="brand"><span>+</span>CERK</div>

        <div id="dials-root" style="width: 100%;"></div>
        
        <div class="footer-cta">
            <p style="margin:0 0 15px 0; font-weight:600; font-size:1rem;">¿Quieres formar parte de nuestro equipo?</p>
            <button class="btn-registrar">REGÍSTRATE</button>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN DE SUPABASE ---
        const SUPABASE_URL = "https://zuknitfklgiuoipnjraj.supabase.co/rest/v1/"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1a25pdGZrbGdpdW9pcG5qcmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NjY4OTcsImV4cCI6MjA5MzM0Mjg5N30.aOeE9uCgGM4DA8xgUap5zqXQqYxRZG0aDa3_V1Cjuxo";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- IMAGEN DE LA PANADERA ---
        // Usamos un placeholder de alta calidad si la URL falla
        const imgPanaderia = "https://images.unsplash.com/photo-1509440159596-0249088772ff?q=80&w=400&auto=format&fit=crop"; 

        const dialConfig = [
            { name: "Gastronomía", items: ["Panadería", "Restaurante", "Fast Food", "Heladería", "Comida China", "Pizzería", "Pollo Brasa", "Cafetería", "Repostería"] },
            { name: "Salud y Bienestar", items: Array(9).fill("Próximamente") },
            { name: "Estilo y Belleza", items: Array(9).fill("Próximamente") }
        ];

        const root = document.getElementById('dials-root');
        let rotations = [0, 0, 0];

        dialConfig.forEach((config, dIdx) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'dial-wrapper';
            let itemsHTML = "";
            
            config.items.forEach((itemLabel, i) => {
                const angle = i * 40;
                // Contenido del cuadro: Si es el 1ero de Gastronomía, foto. Si no, número decorativo.
                const content = (dIdx === 0 && i === 0) 
                    ? `<img src="${imgPanaderia}" class="item-img"><span class="item-text">${itemLabel}</span>`
                    : `<div style="font-size:1.6rem; font-weight:900; color:var(--accent); margin-top:5px;">${i+1}</div><span class="item-text">${itemLabel}</span>`;
                
                itemsHTML += `<div class="carousel__item" id="it-${dIdx}-${i}" style="transform: rotateY(${angle}deg) translateZ(170px) rotateY(-${angle}deg)">${content}</div>`;
            });

            wrapper.innerHTML = `<div class="dial-label">${config.name}</div><div class="scene"><div class="carousel" id="car-${dIdx}">${itemsHTML}</div></div>`;
            root.appendChild(wrapper);

            const carousel = document.getElementById(`car-${dIdx}`);
            let startX = 0, currentRotation = 0;

            const updateRotation = (val) => {
                carousel.style.transform = `rotateY(${val}deg)`;
                for(let i=0; i<9; i++) {
                    const el = document.getElementById(`it-${dIdx}-${i}`);
                    const baseAngle = i * 40;
                    el.style.transform = `rotateY(${baseAngle}deg) translateZ(170px) rotateY(${-baseAngle - val}deg)`;
                }
            };

            carousel.addEventListener('touchstart', e => { 
                startX = e.touches[0].pageX; 
                currentRotation = rotations[dIdx]; 
                carousel.style.transition = 'none'; 
            });

            carousel.addEventListener('touchmove', e => { 
                let delta = (e.touches[0].pageX - startX) * 0.5;
                updateRotation(currentRotation + delta); 
            });

            carousel.addEventListener('touchend', e => {
                let delta = (e.changedTouches[0].pageX - startX) * 0.5;
                rotations[dIdx] = currentRotation + Math.round(delta / 40) * 40;
                carousel.style.transition = 'transform 0.5s ease-out';
                updateRotation(rotations[dIdx]);
            });
        });
    </script>
</body>
</html>
