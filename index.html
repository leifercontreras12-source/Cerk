<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CERK v2.9 - Compact Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg-base: #f0f2f5;
            --navy: #1a3a5f;
            --white-glass: rgba(255, 255, 255, 0.9);
        }
        
        body { 
            background-color: var(--bg-base);
            /* MAPA REAL DE SAN CRISTÓBAL - CAPA DE FONDO */
            background-image: 
                radial-gradient(circle at center, rgba(240,242,245,0.4) 0%, rgba(240,242,245,0.8) 70%, rgba(240,242,245,1) 100%),
                url("https://api.mapbox.com/styles/v1/mapbox/light-v10/static/-72.225,7.766,13,0/600x800?access_token=pk.eyJ1IjoiZ2VtaW5pLWFpIiwiYSI6ImNsZzRndzhrazAxeGkzZ28xZzRndzhrazAifQ"); /* Link educativo de referencia para trama urbana */
            background-attachment: fixed;
            background-size: cover;
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            color: var(--navy); overflow-x: hidden; touch-action: pan-y;
            padding-bottom: 110px;
        }
        
        .app-container { display: flex; flex-direction: column; align-items: center; padding-top: 15px; }
        
        .brand { 
            font-size: 2.5rem; font-weight: 900; letter-spacing: 10px; 
            margin-bottom: 15px; text-shadow: 1px 1px 4px rgba(0,0,0,0.05); 
        }

        /* COMPACTACIÓN DE DIALES */
        .dial-wrapper {
            position: relative; width: 100%; 
            height: 120px; /* Reducido de 155px para que quepan 4 */
            display: flex; flex-direction: column; align-items: center;
            margin-bottom: 12px; /* Espacio mínimo entre diales */
        }

        .dial-label { 
            font-size: 0.75rem; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 2px; margin-bottom: 8px; 
            background: rgba(255,255,255,0.7); padding: 1px 10px; border-radius: 8px;
        }

        .scene { width: 100%; height: 70px; perspective: 1000px; display: flex; justify-content: center; align-items: center; }
        .carousel { width: 130px; height: 55px; position: absolute; transform-style: preserve-3d; }

        .carousel__item {
            position: absolute; width: 115px; height: 52px;
            background: var(--white-glass); border: 1px solid #d1d9e6;
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; font-size: 1.6rem; font-weight: 900;
            color: var(--navy); box-shadow: 0 4px 10px rgba(0,0,0,0.06); 
            backface-visibility: hidden;
        }

        .footer-cta {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(255,255,255,0.98); padding: 18px 0; text-align: center;
            border-top: 1px solid #e0e0e0; z-index: 1000; backdrop-filter: blur(5px);
        }

        .btn-registrar {
            background: var(--navy); color: white; border: none;
            padding: 8px 25px; border-radius: 30px; font-weight: bold;
            margin-top: 8px; cursor: pointer; display: inline-block; text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="brand">CERK</div>
        <div id="dials-root"></div>
    </div>

    <div class="footer-cta">
        <p style="margin:0; font-weight:600; font-size:0.8rem;">¿Quieres formar parte de nuestro equipo?</p>
        <a href="#" class="btn-registrar" onclick="alert('Próximamente...')">REGÍSTRATE</a>
    </div>

    <script>
        // --- CREDENCIALES SUPABASE ---
        const SUPABASE_URL = "https://zuknitfklgiuoipnjraj.supabase.co/rest/v1/"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1a25pdGZrbGdpdW9pcG5qcmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NjY4OTcsImV4cCI6MjA5MzM0Mjg5N30.aOeE9uCgGM4DA8xgUap5zqXQqYxRZG0aDa3_V1Cjuxo";
        // -----------------------------
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const dialNames = ["Gastronomía", "Salud y Bienestar", "Estilo y Estética", "Hogar y Construcción", "Motor e Industria", "Insumos y Distribución", "Indefinido"];
        const root = document.getElementById('dials-root');
        let rotations = new Array(7).fill(0);

        dialNames.forEach((name, dIdx) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'dial-wrapper';
            let itemsHTML = "";
            for(let i=1; i<=9; i++) {
                const angle = (i-1) * 40;
                itemsHTML += `<div class="carousel__item" id="item-${dIdx}-${i-1}" style="transform: rotateY(${angle}deg) translateZ(180px) rotateY(-${angle}deg)">${i}</div>`;
            }
            wrapper.innerHTML = `<div class="dial-label">${name}</div><div class="scene"><div class="carousel" id="carousel-${dIdx}">${itemsHTML}</div></div>`;
            root.appendChild(wrapper);

            const carousel = wrapper.querySelector('.carousel');
            let startX = 0, currentRotation = 0;

            const updateOrbital = (newRot) => {
                carousel.style.transform = `rotateY(${newRot}deg)`;
                for(let i=0; i<9; i++) {
                    const item = document.getElementById(`item-${dIdx}-${i}`);
                    const baseA = i * 40;
                    item.style.transform = `rotateY(${baseA}deg) translateZ(180px) rotateY(${-baseA - newRot}deg)`;
                }
            };

            carousel.addEventListener('touchstart', e => {
                startX = e.touches[0].pageX;
                currentRotation = rotations[dIdx];
                carousel.style.transition = 'none';
                for(let i=0; i<9; i++) document.getElementById(`item-${dIdx}-${i}`).style.transition = 'none';
            });

            carousel.addEventListener('touchmove', e => {
                let diff = e.touches[0].pageX - startX;
                updateOrbital(currentRotation + diff * 0.5); 
            });

            carousel.addEventListener('touchend', e => {
                let diff = e.changedTouches[0].pageX - startX;
                let moveSteps = Math.round((diff * 0.5) / 40);
                rotations[dIdx] = currentRotation + (moveSteps * 40);
                
                const anim = 'transform 0.5s cubic-bezier(0.1, 0.8, 0.2, 1)';
                carousel.style.transition = anim;
                for(let i=0; i<9; i++) document.getElementById(`item-${dIdx}-${i}`).style.transition = anim;
                updateOrbital(rotations[dIdx]);
            });

            carousel.addEventListener('click', () => {
                const index = (Math.round(-rotations[dIdx] / 40) % 9 + 9) % 9;
                console.log(`CERK: ${name} - Opción ${index + 1}`);
            });
        });
    </script>
</body>
</html>
