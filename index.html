        let rotations = new Array(10).fill(0);

        async function inicializarApp() {
            const { data: catDB } = await _supabase.from('categorias').select('*').eq('grupo', 'Gastronomía').order('orden', { ascending: true });
            const root = document.getElementById('dials-root');

            dialConfig.forEach((config, dIdx) => {

                wrapper.className = 'dial-wrapper';
                let itemsHTML = "";
                for (let i = 0; i < 9; i++) {
                    const angle = i * 40;
                    let nombreReal = subcategorias[config.name][i];
let content = `<div style="font-size:1.3rem">📍</div><span class="item-text">${nombreReal}</span>`;
let label = nombreReal;
 ;
                    
                    if (dIdx === 0 && catDB && catDB[i]) {
                        label = catDB[i].nombre;
                        let img = label === "Panadería" ? "https://zuknitfklgiuoipnjraj.supabase.co/storage/v1/object/public/imagenes-cerk/Panaderia.jpg" : catDB[i].imagen_url;
                        content = `<img src="${img}" class="item-img" onerror="this.src='https://via.placeholder.com/150?text=Cerk'"><span class="item-text">${label}</span>`;
                    }
                    itemsHTML += `<div class="carousel__item" onclick="verMapa('${label}')" id="it-${dIdx}-${i}" style="transform: rotateY(${angle}deg) translateZ(185px) rotateY(-${angle}deg)">${content}</div>`;
                }
                wrapper.innerHTML = `<div class="dial-label">${config.name}</div><div class="scene"><div class="carousel" id="car-${dIdx}">${itemsHTML}</div></div>`;
                root.appendChild(wrapper);
                setupCarouselLogic(dIdx);
            });
            map = L.map('map').setView([7.767, -72.230], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        function setupCarouselLogic(dIdx) {
            const car = document.getElementById(`car-${dIdx}`);
            let startX = 0, currentRot = 0, moved = false;
            car.addEventListener('touchstart', e => { startX = e.touches[0].pageX; currentRot = rotations[dIdx]; car.style.transition = 'none'; moved = false; }, {passive: true});
            car.addEventListener('touchmove', e => { 
                let delta = (e.touches[0].pageX - startX) * 0.7; 
                if(Math.abs(delta) > 5) moved = true;
                updateRot(dIdx, currentRot + delta); 
            }, {passive: true});
            car.addEventListener('touchend', () => {
                if(!moved) return;
                rotations[dIdx] = Math.round(rotations[dIdx] / 40) * 40;
                car.style.transition = 'transform 0.5s ease-out';
                updateRot(dIdx, rotations[dIdx]);
            });
        }

        function updateRot(dIdx, val) {
            rotations[dIdx] = val;
            const car = document.getElementById(`car-${dIdx}`);
            car.style.transform = `rotateY(${val}deg)`;
            for(let i=0; i<9; i++) {
                const el = document.getElementById(`it-${dIdx}-${i}`);
                if (el) {
                    const base = i * 40;
                    el.style.transform = `rotateY(${base}deg) translateZ(185px) rotateY(${-base - val}deg)`;
                }
            }
        }

        function irA(id) {

        async function verMapa(labelRaw) {
    const label = labelRaw.charAt(0).toUpperCase() + labelRaw.slice(1).toLowerCase();
    document.getElementById('map-title').innerText = label.toUpperCase();
    irA('map-view');

    console.log("Iniciando GPS...");

    navigator.geolocation.getCurrentPosition(async (pos) => {
        // ESTO SIEMPRE ES MINÚSCULA (es del navegador, no de Supabase)
        const uLat = pos.coords.latitude; 
        const uLon = pos.coords.longitude;

        console.log("Ubicación obtenida:", uLat, uLon);

        // Centrar mapa
        map.setView([uLat, uLon], 15);
        L.circle([uLat, uLon], { radius: 20, color: 'blue' }).addTo(map).bindPopup("Tu ubicación").openPopup();

        // CONSULTA A SUPABASE
        // Verifica si tu variable es _supabase o supabase
        const { data: Comercios, error } = await _supabase
            .from('Comercios')
            .select('*'); 

        if (error) {
            console.error("Error de Supabase:", error);
            return;
        }

        // FILTRO MANUAL (Más seguro para evitar errores de base de datos)
        // Buscamos los que coincidan con el Tipo y tengan Pago_confirmado
        let encontrados = Comercios.filter(c => 
            c.Tipo === label && 
            (c.Pago_confirmado === true || c.Pago_confirmado === "true")
        );

        // CALCULAR DISTANCIAS
        encontrados = encontrados.map(c => {
            // Aquí usamos Mayúsculas porque así me dijiste que están en tu tabla
            const latComercio = parseFloat(c.Latitud);
            const lonComercio = parseFloat(c.Longitud);
            c.distancia = calcularDistancia(uLat, uLon, latComercio, lonComercio);
            return c;
        }).sort((a, b) => a.distancia - b.distancia);

        const markersLayer = L.layerGroup().addTo(map);

        // Lógica de mostrar (Si no hay cerca, activar el aviso de búsqueda global)
        let mostrar = encontrados.filter(c => c.distancia <= 1.5);

        if (mostrar.length === 0 && encontrados.length > 0) {
            const global = confirm(`No hay comercios cerca. ¿Quieres ver los ${encontrados.length} encontrados en otras zonas?`);
            if (global) {
                mostrar = encontrados;
                const coords = mostrar.map(c => [parseFloat(c.Latitud), parseFloat(c.Longitud)]);
                map.fitBounds(coords);
            }
        }

        // PINTAR PINS
        mostrar.forEach(c => {
            L.marker([parseFloat(c.Latitud), parseFloat(c.Longitud)])
                .addTo(markersLayer)
                .bindPopup(`<b>${c.Nombre}</b><br>Distancia: ${(c.distancia).toFixed(1)} km`);
        });

    }, (err) => {
        alert("Error de GPS: " + err.message);
    }, { enableHighAccuracy: true });
}

        
        function obtenerGPS() {
    const status = document.getElementById('gps-status');
    const btn = document.querySelector('.btn-gps');
    
    status.innerText = "⌛ Buscando tu local...";
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            
            // Éxito: Texto y color verde esmeralda
            status.innerText = "✅ Ubicación lista";
            status.style.color = "#27ae60";
            status.style.fontWeight = "bold";
            
            // El botón también se transforma
            if(btn) {
                btn.style.background = "#27ae60";
                btn.innerText = "📍 UBICACIÓN REGISTRADA";
            }
        },
        (err) => {
            alert("❌ Error: Por favor activa el GPS de tu equipo.");
            status.innerText = "No capturada";
            status.style.color = "#d63031";
        },
        { enableHighAccuracy: true, timeout: 10000 }
    );
}

        async function finalizarRegistro() {
    // 1. Referencias a los elementos
    const btn = document.querySelector("button[onclick='finalizarRegistro()']");
    const nombre = document.getElementById('reg-nombre')?.value;
    const dial = document.getElementById('sel-dial')?.value;
    const tipo = document.getElementById('sel-tipo')?.value;
    const tlf = document.getElementById('reg-tel')?.value;
    const valorHorario = document.getElementById('reg-horario')?.value || "No provista";
    const fotosInput = document.getElementById('reg-fotos');
    const fotos = fotosInput ? fotosInput.files : [];

    // 2. VALIDACIÓN: Formulario vacío
    if (!nombre || !tlf || !tipo) {
        alert("⚠️ Por favor, llena el formulario primero.");
        return;
    }

    // 3. VALIDACIÓN: GPS obligatorio
    if (typeof userCoords === 'undefined' || !userCoords) {
        alert("📍 Es obligatorio capturar la ubicación GPS del local.");
        return;
    }

    // 4. VALIDACIÓN: Cantidad de fotos (Mínimo 2, Máximo 3)
    if (fotos.length < 2 || fotos.length > 3) {
        alert("📸 Debes seleccionar mínimo 2 y máximo 3 fotos.");
        return;
    }

    // 5. VALIDACIÓN: Peso de fotos (Máximo 1MB por cada una)
    for (let i = 0; i < fotos.length; i++) {
        if (fotos[i].size > 1048576) { // 1MB en bytes
            alert(`⚠️ La foto "${fotos[i].name}" es muy pesada. Máximo 1MB.`);
            return;
        }
    }

    try {
        // Bloqueo del botón para evitar duplicados
        btn.disabled = true;
        btn.innerText = "⏳ Procesando registro...";

        let fotosSubidasUrls = [];

        // 6. SUBIDA A BUCKET (fotos-comercios)
        for (let i = 0; i < fotos.length; i++) {
            const file = fotos[i];
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}_${i}.${fileExt}`;

            const { data, error: uploadError } = await _supabase.storage
                .from('imagenes_comercios')
                .upload(fileName, file);

            if (uploadError) throw uploadError;

            const { data: { publicUrl } } = _supabase.storage
                .from('imagenes_comercios')
                .getPublicUrl(fileName);
            
            fotosSubidasUrls.push(publicUrl);
        }

        // 7. GUARDADO EN TABLA (Comercios)
        const { error: insertError } = await _supabase
            .from('Comercios')
            .insert([{
                Nombre: nombre,
                Dial: dial,
                Tipo: tipo,
                WhatsApp: tlf,
                Horario: valorHorario,
                Latitud: userCoords.lat,
                Longitud: userCoords.lng,
                Fotos_urls: fotosSubidasUrls,
                Pago_confirmado: false
            }]);

        if (insertError) throw insertError;

        // 8. ÉXITO: Salto a WhatsApp
                // 1. Definir el mensaje de WhatsApp

}
function calcularDistancia(lat1, lon1, lat2, lon2) {
    const R = 6371; // Radio de la Tierra en km
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c; // Retorna distancia en km
}
