<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>+CERK v7.2 - Restauración Total</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-base: #f4f7f9; --navy: #1a3a5f; --accent: #00b4d8; --white: #ffffff; }
        
        /* FONDO DE MAPA DIFUSO RESTAURADO */
        body { 
            background-color: var(--bg-base); 
            background-image: radial-gradient(circle at center, rgba(244,247,249,0.2) 0%, rgba(244,247,249,0.98) 100%),
            url("data:image/svg+xml;base64,CjxzdmcgeG1sbnM9J2h0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnJyB3aWR0aD0nODAwJyBoZWlnaHQ9JzgwMCcgdmlld0JveD0nMCAwIDgwMCA4MDAnPgogICAgPHJlY3Qgd2lkdGg9JzgwMCcgaGVpZ2h0PSc4MDAnIGZpbGw9JyNmNGY3ZjknLz4KICAgIDxnIHN0cm9rZT0nIzFhM2E1Zicgc3Ryb2tlLXdpZHRoPScxLjInIHN0cm9rZS1vcGFjaXR5PScwLjA4JyBmaWxsPSdub25lJz4KICAgICAgICA8cGF0aCBkPSdNMCAxNTAgTDgwMCAxNTAgTTAgNDUwIEw4MDAgNDUwIE0xNTAgMCBMMTUwIDgwMCBNNTUwIDAgTDU1MCA4MDAnLz4KICAgICAgICA8cGF0aCBkPSdNMCAwIEw4MDAgNjAwIE04MDAgMCBMMCA4MDAgTTMwMCAwIEw4MDAgNTAwIE0wIDMwMCBMNTAwIDgwMCcvPgogICAgPC9nPgo8L3N2Zz4=");
            background-attachment: fixed; margin: 0; font-family: 'Segoe UI', sans-serif; color: var(--navy); overflow-x: hidden;
        }

        /* PANTALLAS */
        .screen { display: none; min-height: 100vh; width: 100%; flex-direction: column; align-items: center; }
        .active { display: flex; }

        /* INTRO ANIMADA */
        #intro-screen { background: var(--navy); color: white; justify-content: center; z-index: 9999; position: fixed; }
        .fade-out { animation: fadeOut 0.5s forwards; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }

        /* UI PRINCIPAL Y DIALES */
        .brand { font-family: "Brush Script MT", cursive; font-size: 1.8rem; margin-top: 5px; margin-bottom: 8px; opacity: 0.5; text-align: center; }
        .brand span { color: var(--accent); font-family: sans-serif; font-weight: 900; margin-right: -4px; }
        .dial-wrapper { width: 100%; height: 132px; display: flex; flex-direction: column; align-items: center; margin-bottom: 2px; }
        .dial-label { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; opacity: 0.9; z-index: 10; }
        .scene { width: 100%; height: 88px; perspective: 1200px; display: flex; justify-content: center; }
        .carousel { width: 135px; height: 82px; position: absolute; transform-style: preserve-3d; transition: transform 0.5s ease-out; }
        .carousel__item {
            position: absolute; width: 125px; height: 80px; background: white; border: 1.5px solid #d1d9e6; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 4px 8px rgba(26, 58, 95, 0.06); backface-visibility: hidden; overflow: hidden;
        }
        .item-img { width: 100%; height: 74%; object-fit: cover; border-bottom: 1px solid #f0f0f0; }
        .item-text { font-size: 0.56rem; font-weight: 900; margin: 2px 1px; text-transform: uppercase; text-align: center; }

        /* FORMULARIO ELEGANTE - FOTO 1 */
.form-container { 
    width: 92%; max-width: 400px; background: white; border-radius: 25px; 
    margin: 20px auto; padding: 25px; box-sizing: border-box; 
    box-shadow: 0 15px 35px rgba(26, 58, 95, 0.15); 
}
.form-group { margin-bottom: 18px; text-align: left; }
label { 
    display: block; font-size: 0.75rem; font-weight: 900; 
    color: #1a3a5f; text-transform: uppercase; margin-bottom: 6px; 
}
input, select { 
    width: 100%; padding: 12px; border: 2px solid #e1e8f0; 
    border-radius: 12px; box-sizing: border-box; font-size: 0.95rem;
}
.gps-container {
    border: 2px dashed #00b4d8; background: #f0faff;
    border-radius: 15px; padding: 15px; text-align: center; margin-bottom: 20px;
}
.warning-text { color: #d63031; font-size: 0.7rem; font-weight: bold; display: block; margin-top: 5px; }
.btn-gps { background: #00b4d8; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
.btn-main { background: #1a3a5f; color: white; width: 100%; padding: 14px; border: none; border-radius: 40px; font-weight: 800; cursor: pointer; }

        /* MAPA */
        .map-header { width: 100%; background: var(--navy); color: white; padding: 15px; display: flex; justify-content: space-between; box-sizing: border-box; }
        #map { flex: 1; width: 100%; height: 100vh; }
        .footer-cta { width: 100%; background: white; padding: 15px 0; text-align: center; border-top: 1px solid #e0e0e0; }
    </style>
</head>
<body>

    <div id="intro-screen" class="screen">
        <h1 style="font-family: 'Brush Script MT', cursive; font-size: 3rem;">Bienvenido a +CERK</h1>
    </div>

    <div id="main-ui" class="screen active">
        <div class="brand"><span>+</span>CERK</div>
        <div id="dials-root" style="width: 100%;"></div>
        <div class="footer-cta">
            <button class="btn-main" style="width: auto; padding: 10px 40px;" onclick="mostrarIntroRegistro()">REGÍSTRATE</button>
        </div>
    </div>

    <div id="register-ui" class="screen" style="background: #f4f7f9;">
    <div class="form-container">
        <h2 style="text-align:center; color:#1a3a5f; margin-top:0;">Nuevo Comercio</h2>
        
        <div class="form-group">
            <label>Nombre del Comercio</label>
            <input type="text" id="reg-nombre" placeholder="Ej: Panadería El Sol">
        </div>

        <div class="form-group">
            <label>Principio de la Marcación (Dial)</label>
            <select id="sel-dial" onchange="actualizarSubcategorias()">
                <option value="">Selecciona...</option>
                <option value="Gastronomía">1. Gastronomía</option>
                <option value="Salud y Bienestar">2. Salud y Bienestar</option>
                <option value="Estilo y Estética">3. Estilo y Estética</option>
                <option value="Hogar y Construcción">4. Hogar y Construcción</option>
                <option value="Motor e Industria">5. Motor e Industria</option>
                <option value="Insumos y Distribución">6. Insumos y Distribución</option>
                <option value="Indefinido">7. Indefinido</option>
            </select>
        </div>

        <div class="form-group">
            <label>¿Qué tipo de negocio es?</label>
            <select id="sel-tipo">
                <option value="">Primero elige un dial...</option>
            </select>
        </div>

        <div class="form-group">
            <label>WhatsApp</label>
            <input type="tel" id="reg-tel" placeholder="Ej: 04121234567">
        </div>

        <div class="form-group">
            <label>Horario de Trabajo</label>
            <input type="text" id="reg-horario" placeholder="Ej: 8:00 - 12:00 / 14:00 - 18:00">
        </div>

        <div class="form-group">
            <label>Fotos (Máx. 3 - 1MB c/u)</label>
            <input type="file" id="reg-fotos" multiple accept="image/*">
        </div>

        <div class="gps-container">
            <button class="btn-gps" onclick="obtenerGPS()">Capturar Ubicación GPS</button>
            <span id="gps-status" style="display:block; margin-top:5px; font-size:0.7rem;">No capturada</span>
            <span class="warning-text">¡Hazlo desde el físico local para precisión!</span>
        </div>

        <button class="btn-main" onclick="finalizarRegistro()">ACTIVAR Y PAGAR</button>
        <button onclick="irA('main-ui')" style="background:none; border:none; color:#1a3a5f; width:100%; margin-top:15px; font-weight:bold; cursor:pointer;">VOLVER ATRÁS</button>
    </div>
</div>


    <div id="map-view" class="screen">
        <div class="map-header"><span id="map-title">MAPA</span><button onclick="irA('main-ui')" style="background:var(--accent); border:none; color:white; padding:5px 10px; border-radius:5px;">CERRAR</button></div>
        <div id="map"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://zuknitfklgiuoipnjraj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1a25pdGZrbGdpdW9pcG5qcmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NjY4OTcsImV4cCI6MjA5MzM0Mjg5N30.aOeE9uCgGM4DA8xgUap5zqXQqYxRZG0aDa3_V1Cjuxo";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const dialConfig = [
            { name: "Gastronomía" }, { name: "Salud y Bienestar" }, { name: "Estilo y Estética" },
            { name: "Hogar y Construcción" }, { name: "Motor e Industria" }, { name: "Insumos y Distribución" }, { name: "Indefinido" }
        ];

        const subcategorias = {
    "Gastronomía": ["Panadería", "Heladería", "Comida Rápida", "Restaurant", "Repostería", "Pizzería", "Cafetería", "Comida China", "Pollo en Brasa"],
    "Salud y Bienestar": ["Farmacia", "Consultorio", "Gimnasio", "Spa", "Clínica", "Óptica", "Laboratorio", "Odontología", "Estética"],
    "Estilo y Estética": ["Peluquería", "Barbería", "Tienda de Ropa", "Calzado", "Accesorios", "Maquillaje", "Manicura", "Tatuajes", "Sastrería"],
    "Hogar y Construcción": ["Ferretería", "Pinturas", "Mueblería", "Decoración", "Iluminación", "Carpintería", "Plomería", "Electricidad", "Vidriería"],
    "Motor e Industria": ["Mecánica", "Repuestos", "Autolavado", "Latonería", "Venta de Vehículos", "Cauchería", "Lubricantes", "Baterías", "Electromecánica"],
    "Insumos y Distribución": ["Mayorista", "Embalajes", "Limpieza", "Papelería", "Tecnología", "Seguridad", "Transporte", "Fletes", "Almacenaje"],
    "Indefinido": ["Otros", "Servicios Varios", "Emprendimiento Nuevo"]
};


        let rotations = new Array(7).fill(0);
        let map;

        async function inicializarApp() {
            const { data: catDB } = await _supabase.from('categorias').select('*').eq('grupo', 'Gastronomía').order('orden', { ascending: true });
            const root = document.getElementById('dials-root');

            dialConfig.forEach((config, dIdx) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'dial-wrapper';
                let itemsHTML = "";
                for (let i = 0; i < 9; i++) {
                    const angle = i * 40;
                    let content = `<div style="font-size:1.3rem">📍</div><span class="item-text">PRÓXIMAMENTE</span>`;
                    let label = "Próximamente";
                    
                    if (dIdx === 0 && catDB && catDB[i]) {
                        label = catDB[i].nombre;
                        let img = label === "Panadería" ? "https://zuknitfklgiuoipnjraj.supabase.co/storage/v1/object/public/imagenes-cerk/Panaderia.jpg" : catDB[i].imagen_url;
                        content = `<img src="${img}" class="item-img" onerror="this.src='https://via.placeholder.com/150?text=Cerk'"><span class="item-text">${label}</span>`;
                    }
                    itemsHTML += `<div class="carousel__item" onclick="verMapa('${label}')" id="it-${dIdx}-${i}" style="transform: rotateY(${angle}deg) translateZ(185px) rotateY(-${angle}deg)">${content}</div>`;
                }
                wrapper.innerHTML = `<div class="dial-label">${config.name}</div><div class="scene"><div class="carousel" id="car-${dIdx}">${itemsHTML}</div></div>`;
                root.appendChild(wrapper);
                setupCarouselLogic(dIdx);
            });
            map = L.map('map').setView([7.767, -72.230], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        function setupCarouselLogic(dIdx) {
            const car = document.getElementById(`car-${dIdx}`);
            let startX = 0, currentRot = 0, moved = false;
            car.addEventListener('touchstart', e => { startX = e.touches[0].pageX; currentRot = rotations[dIdx]; car.style.transition = 'none'; moved = false; }, {passive: true});
            car.addEventListener('touchmove', e => { 
                let delta = (e.touches[0].pageX - startX) * 0.7; 
                if(Math.abs(delta) > 5) moved = true;
                updateRot(dIdx, currentRot + delta); 
            }, {passive: true});
            car.addEventListener('touchend', () => {
                if(!moved) return;
                rotations[dIdx] = Math.round(rotations[dIdx] / 40) * 40;
                car.style.transition = 'transform 0.5s ease-out';
                updateRot(dIdx, rotations[dIdx]);
            });
        }

        function updateRot(dIdx, val) {
            rotations[dIdx] = val;
            const car = document.getElementById(`car-${dIdx}`);
            car.style.transform = `rotateY(${val}deg)`;
            for(let i=0; i<9; i++) {
                const el = document.getElementById(`it-${dIdx}-${i}`);
                if (el) {
                    const base = i * 40;
                    el.style.transform = `rotateY(${base}deg) translateZ(185px) rotateY(${-base - val}deg)`;
                }
            }
        }

        function irA(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'map-view') setTimeout(() => map.invalidateSize(), 200);
        }

        function mostrarIntroRegistro() {
            const intro = document.getElementById('intro-screen');
            intro.classList.add('active');
            setTimeout(() => { intro.classList.add('fade-out'); setTimeout(() => { intro.classList.remove('active', 'fade-out'); irA('register-ui'); }, 500); }, 2000);
        }

        function actualizarSubcategorias() {
            const dial = document.getElementById('sel-dial').value;
            const tipo = document.getElementById('sel-tipo');
            tipo.innerHTML = '';
            if(subcategorias[dial]) subcategorias[dial].forEach(s => tipo.innerHTML += `<option value="${s}">${s}</option>`);
        }

        function verMapa(label) {
            document.getElementById('map-title').innerText = label.toUpperCase();
            irA('map-view');
        }

        async function finalizarRegistro() {
    // 1. Recoger los datos de los campos
    const nombre = document.getElementById('reg-nombre').value;
    const dial = document.getElementById('sel-dial').value;
    const tipo = document.getElementById('sel-tipo').value;
    const tlf = document.getElementById('reg-tel').value;
    const fotos = document.getElementById('reg-fotos').files;

    // 2. EL CANDADO: Validación de campos obligatorios
    if (!nombre || !dial || !tipo || !tlf) {
        alert("❌ Por favor, rellena todos los campos de texto y selecciona el tipo de negocio.");
        return; // Se detiene aquí
    }

    if (!userCoords) {
        alert("📍 Es obligatorio capturar la ubicación GPS del local.");
        return; // Se detiene aquí
    }

        // 3. Validación de Cantidad (Mínimo 2, Máximo 3)
    if (fotos.length < 2 || fotos.length > 3) {
        alert("📸 Por seguridad y estética, debes subir entre 2 y 3 fotos.");
        return;
    }

    // 4. Validación de Peso (Máximo 1MB por foto)
    for (let i = 0; i < fotos.length; i++) {
        if (fotos[i].size > 1048576) {
            alert(`⚠️ La foto "${fotos[i].name}" es muy pesada. El máximo permitido es 1MB.`);
            return;
        }
    }


    // 3. Si todo está bien, procedemos
    alert("🚀 ¡Datos validados con éxito! Ahora te redirigiremos a WhatsApp para confirmar tu pago.");
    
    const mensaje = `Hola! Quiero activar mi comercio:%0A- Nombre: ${nombre}%0A- Dial: ${dial}%0A- Tipo: ${tipo}%0A- Ubicación: ${userCoords.lat}, ${userCoords.lng}`;
    
    // Aquí pon TU número sin el símbolo + (Ejemplo: 584120000000)
    const tuNumero = "584247126548"; 
    window.location.href = `https://wa.me/${tuNumero}?text=${mensaje}`;
}


        window.onload = inicializarApp;
    </script>
</body>
</html>
