<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>+CERK</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-base: #f4f7f9; --navy: #1a3a5f; --accent: #00b4d8; --white: #ffffff; }
        body { background-image: linear-gradient(rgba(255,255,255,0.82), rgba(255,255,255,0.82)), url('1778466671825 (1).webp'); background-size: cover; background-position: center; background-attachment: fixed; margin: 0; overflow-x: hidden; width: 100vw; position: relative; font-family: sans-serif; }
        
        .screen { display: none; min-height: 100vh; width: 100%; flex-direction: column; align-items: center; }
        .active { display: flex; }

        /* Splash y Bienvenida */
        #splash-screen, #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease-out; }
        #splash-screen { background-image: url('1778466671825 (1).webp'); background-size: cover; }
        #welcome-screen { background: var(--accent); color: white; flex-direction: column; display: none; }
        .fade-out { opacity: 0; pointer-events: none; }

        /* Encabezado */
        .brand { font-family: "Brush Script MT", cursive; font-size: 1.8rem; margin-top: 5px; margin-bottom: 8px; opacity: 0.5; text-align: center; background: white; width: 100%; height: 70px; display: flex; justify-content: center; align-items: center; position: relative; }
        
        /* Diales */
        .dial-wrapper { width: 100%; height: 135px; display: flex; flex-direction: column; align-items: center; margin-bottom: 2px; }
        .dial-label { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; opacity: 0.9; }
        .scene { width: 100%; height: 88px; perspective: 1200px; display: flex; justify-content: center; }
        .carousel { width: 135px; height: 82px; position: absolute; transform-style: preserve-3d; transition: transform 0.5s ease-out; }
        .carousel__item { position: absolute; width: 125px; height: 80px; background: white; border: 1.5px solid #d1d9e6; border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(26, 58, 95, 0.06); backface-visibility: hidden; }
        .item-text { font-size: 0.56rem; font-weight: 900; text-transform: uppercase; text-align: center; padding: 5px; }

        /* Formulario */
        .form-container { width: 92%; max-width: 400px; background: white; border-radius: 25px; margin: 20px auto; padding: 25px; box-sizing: border-box; box-shadow: 0 15px 35px rgba(26, 58, 95, 0.15); }
        .form-group { width: 100%; margin-bottom: 15px; }
        .form-group label { font-size: 0.75rem; font-weight: bold; color: var(--navy); display: block; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1.5px solid #e0e0e0; border-radius: 10px; box-sizing: border-box; font-size: 0.9rem; }
        
        /* Botones */
        .btn-main { background: var(--accent); color: white; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; width: 80%; margin: 20px 0; }
        .btn-sec { background: #e0e0e0; color: var(--navy); border: none; padding: 10px; border-radius: 10px; width: 100%; margin-top: 10px; font-weight: bold; }

        /* Mapa */
        .map-header { width: 100%; background: var(--navy); color: white; padding: 15px; display: flex; justify-content: space-between; box-sizing: border-box; }
        #map { flex: 1; width: 100%; height: 70vh; }
        .filter-bar { width: 100%; background: white; overflow-x: auto; display: flex; gap: 10px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .globito { background: var(--accent); color: white; padding: 8px 15px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; border: none; white-space: nowrap; }
    </style>
</head>
<body>

<div id="splash-screen"><img src="1778462340724 (1).png" alt="Logo" style="width:240px;"></div>

<div id="welcome-screen">
    <h2 style="font-family: 'Georgia', serif; font-style: italic; font-weight: normal; margin-bottom: 0;">bienvenido a</h2>
    <h1 style="font-size: 3rem; margin-top: 0;">+CERK</h1>
</div>

<div id="main-ui" class="screen active">
    <div class="brand">
        <div id="count_hoy" style="position: absolute; left: 15px; font-size: 0.7rem;"></div>
        <div style="font-family: 'Georgia', serif; font-style: italic; font-size: 2.1rem; display: flex; align-items: center;">
            <span style="color: #40E0D0; font-weight: bold;">+</span><span style="color: #7a8a99;">Cerk</span>
        </div>
        <div id="count_mes" style="position: absolute; right: 15px; font-size: 0.7rem;"></div>
    </div>
    <div id="dials-root"></div>
    <button class="btn-main" onclick="mostrarRegistro()">REGÍSTRATE</button>
</div>

<div id="reg-ui" class="screen">
    <div class="form-container">
        <h3 style="color:var(--navy); text-align:center;">Registro de Comercio</h3>
        <div class="form-group">
            <label>Nombre del Local</label>
            <input type="text" id="reg-nombre" placeholder="Nombre comercial">
        </div>
        <div class="form-group">
            <label>Categoría (Dial)</label>
            <select id="reg-dial" onchange="cargarSubcategoriasRegistro()">
                <option value="">Selecciona...</option>
            </select>
        </div>
        <div class="form-group">
            <label>Sub-Categoría</label>
            <select id="reg-sub" onchange="cargarSubdivisionesRegistro()" disabled>
                <option value="">Primero elige categoría</option>
            </select>
        </div>
        <div class="form-group">
            <label>Sub-División (Tipo)</label>
            <select id="reg-tipo" disabled>
                <option value="">Primero elige sub-categoría</option>
            </select>
        </div>
        <div class="form-group">
            <label>WhatsApp (10-12 dígitos)</label>
            <input type="tel" id="reg-ws" placeholder="Ej: 584141234567">
        </div>
        <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" id="reg-email" placeholder="ejemplo@dominio.com">
        </div>
        <div class="form-group">
            <label>Horario</label>
            <input type="text" id="reg-horario" placeholder="8:00am-12:00pm / 1:00pm-5:00pm">
        </div>
        <div class="form-group">
            <label>Fotos (mín 2, máx 3 - máx 3MB c/u)</label>
            <input type="file" id="reg-fotos" multiple accept="image/*">
        </div>
        <button class="btn-sec" onclick="capturarGPS()">Capturar Ubicación GPS</button>
        <p id="gps-status" style="font-size:0.6rem; text-align:center; margin-top:5px; color:green; display:none;">✓ Ubicación capturada</p>
        
        <button class="btn-main" id="btn-activar" onclick="procesarRegistro()" style="width:100%;">ACTIVAR Y PAGAR</button>
        <button class="btn-sec" onclick="irA('main-ui')" style="background:none; color:grey;">Atrás</button>
    </div>
</div>

<div id="map-view" class="screen">
    <div class="map-header">
        <span id="map-title" style="font-weight:bold; text-transform:uppercase;">MAPA</span>
        <button onclick="irA('main-ui')" style="background:var(--accent); border:none; color:white; padding:5px 15px; border-radius:5px; font-weight:bold;">CERRAR</button>
    </div>
    <div id="filter-container" class="filter-bar"></div>
    <div id="map"></div>
</div>

<script>
    const SUPABASE_URL = "https://zuknitfklgiuoipnjraj.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1a25pdGZrbGdpdW9pcG5qcmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NjY4OTcsImV4cCI6MjA5MzM0Mjg5N30.aOeE9uCgGM4DA8xgUap5zqXQqYxRZG0aDa3_V1Cjuxo";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let map, markersLayer, userCoords, regCoords;
    let rotations = new Array(10).fill(0);

    const dialConfig = [
        { name: "GASTRONOMIA" }, { name: "SALUD Y BIENESTAR" }, { name: "ESTILO Y BELLEZA" },
        { name: "HOGAR Y CONSTRUCCION" }, { name: "AUTOMOTRIZ" }, { name: "DIESEL E INDUSTRIA" },
        { name: "INSUMOS Y DISTRIBUCION" }, { name: "TECNOLOGIA Y COMUNICACION" }, { name: "SERVICIOS Y LOGISTICA" }, { name: "EXCLUSIVO" }
    ];

    const subcategorias = {
        "GASTRONOMIA": ["PANADERIA", "HELADERIA", "RESTAURANT", "COMIDA RAPIDA", "PIZZERIA", "CAFETERIA", "BODEGON Y LICORES", "MINI MARKETS", "FRIGORIFICO"],
        "SALUD Y BIENESTAR": ["FARMACIA", "CONSULTORIO CLINICO", "OPTICA Y AUDICION", "LAB CLINICO", "MATERNO INFANTIL", "IMAGENOLOGIA", "CLINICA DENTAL", "TERAPIA", "VIDA SANA"],
        "ESTILO Y BELLEZA": ["SALON DE BELLEZA", "ESTETICA", "ROPA Y CALZADO", "PERFUMERIA Y COSMETICOS", "BOUTIQUE", "DEPORTE Y FITNESS", "ATELIER", "LAVANDERIA Y TINTORERIA", "TATUAJES Y PIERCINGS"],
        "HOGAR Y CONSTRUCCION": ["FERRETERIA", "MOBILIARIO", "ELECTRODOMESTICOS", "ACABADOS", "CARPINTERIA", "TEXTILES", "PET Y AGRO", "MAQUINARIA", "PROXIMAMENTE"],
        "AUTOMOTRIZ": ["MANTENIMIENTO RAPIDO", "MOTOR", "ELECTR Y SONIDO", "TRANSMISION Y DIFF", "TREN DELANTERO", "REFRIGERACION", "SILENCIADOR Y ESCAPE", "ESTETICA", "MUNDO MOTO"],
        "DIESEL E INDUSTRIA": ["LAB DIESEL", "MEC PESADA", "METALMECANICA", "HIDRAULICA", "SIS AIRE", "AMARILLAS Y AGRO", "ELECTROAUTO 24V", "TRANSMISION Y EJES", "REPUESTOS DIESEL"],
        "INSUMOS Y DISTRIBUCION": ["PAPELERIA", "PLASTICOS Y BOLSAS", "INSUMOS DE REPOSTERIA", "QUIMICOS", "GAS A PRESION", "FERRETORNILLOS", "MAYORISTA", "DISTRIBUIDORA", "SEGURIDAD"],
        "TECNOLOGIA Y COMUNICACION": ["DISP MOVILES", "EQUIPOS DE OFICINA", "SEGURIDAD Y VIGILANCIA", "IMPRENTA", "MUSICA", "TELECOMUNICACION", "GAMING", "FOTO STUDIO", "REDES Y CONECTIVIDAD"],
        "SERVICIOS Y LOGISTICA": ["ENVIOS", "AGENCIA DE TURISMO", "AGENCIA DE FESTEJO", "REFRIGERACION", "TECNICOS A DOMICILIO", "VIGILANCIA PRIVADA", "LIC Y PROFESIONALES", "TRANSPORTE", "VARIOS"],
        "EXCLUSIVO": ["REGALOS Y DETALLES", "FLORISTERIA", "JUGUETERIA", "INSUMOS PARA DEPORTE", "HOBBY", "JUEGOS", "LOTERIA", "TIENDA PARA ADULTOS", "AVENTURA Y RECREACION"]
    };

    async function inicializarApp() {
        renderizarDiales();
        popularSelectCategorias();
        map = L.map('map').setView([7.767, -72.230], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        markersLayer = L.layerGroup().addTo(map);
        setTimeout(() => { document.getElementById('splash-screen').classList.add('fade-out'); }, 1000);
    }

    function renderizarDiales() {
        const root = document.getElementById('dials-root');
        dialConfig.forEach((dial, dIdx) => {
            const wrap = document.createElement('div');
            wrap.className = 'dial-wrapper';
            wrap.innerHTML = `<div class="dial-label">${dIdx+1}. ${dial.name}</div><div class="scene"><div class="carousel" id="car-${dIdx}"></div></div>`;
            root.appendChild(wrap);
            const car = wrap.querySelector(`#car-${dIdx}`);
            subcategorias[dial.name].forEach((sub, iIdx) => {
                const item = document.createElement('div');
                item.className = 'carousel__item';
                item.id = `it-${dIdx}-${iIdx}`;
                item.innerHTML = `<div class="item-text">${sub}</div>`;
                item.onclick = () => verMapa(sub);
                car.appendChild(item);
            });
            setupCarouselLogic(dIdx);
            updateRot(dIdx, 0);
        });
    }

    // REGISTRO Y CASCADA
    function mostrarRegistro() {
        const welcome = document.getElementById('welcome-screen');
        welcome.style.display = 'flex';
        setTimeout(() => {
            welcome.classList.add('fade-out');
            irA('reg-ui');
            setTimeout(() => { welcome.style.display = 'none'; welcome.classList.remove('fade-out'); }, 500);
        }, 1500);
    }

    function popularSelectCategorias() {
        const sel = document.getElementById('reg-dial');
        dialConfig.forEach(d => { sel.innerHTML += `<option value="${d.name}">${d.name}</option>`; });
    }

    function cargarSubcategoriasRegistro() {
        const cat = document.getElementById('reg-dial').value;
        const subSel = document.getElementById('reg-sub');
        subSel.innerHTML = '<option value="">Selecciona...</option>';
        if(cat) {
            subcategorias[cat].forEach(s => { subSel.innerHTML += `<option value="${s}">${s}</option>`; });
            subSel.disabled = false;
        }
    }

    async function cargarSubdivisionesRegistro() {
        const sub = document.getElementById('reg-sub').value;
        const tipoSel = document.getElementById('reg-tipo');
        tipoSel.innerHTML = '<option value="">Cargando...</option>';
        const { data } = await _supabase.from('categorias').select('busqueda').eq('nombre', sub).single();
        if(data && data.busqueda) {
            tipoSel.innerHTML = '<option value="">Selecciona...</option>';
            data.busqueda.split(',').forEach(t => { tipoSel.innerHTML += `<option value="${t.trim()}">${t.trim()}</option>`; });
            tipoSel.disabled = false;
        }
    }

    function capturarGPS() {
        navigator.geolocation.getCurrentPosition(p => {
            regCoords = { lat: p.coords.latitude, lon: p.coords.longitude };
            document.getElementById('gps-status').style.display = 'block';
        }, () => alert("Error al capturar GPS. Activa la ubicación."));
    }

    async function procesarRegistro() {
        const nombre = document.getElementById('reg-nombre').value;
        const dial = document.getElementById('reg-dial').value;
        const tipo = document.getElementById('reg-tipo').value;
        const ws = document.getElementById('reg-ws').value;
        const email = document.getElementById('reg-email').value;
        const fotos = document.getElementById('reg-fotos').files;

        if(!nombre || !tipo || ws.length < 10 || fotos.length < 2 || !regCoords) {
            alert("Por favor completa todos los campos, captura la ubicación y sube al menos 2 fotos.");
            return;
        }

        const btn = document.getElementById('btn-activar');
        btn.innerText = "PROCESANDO...";
        btn.disabled = true;

        // Aquí iría la subida a Supabase Storage y el Insert en tabla Comercios
        // Por ahora simulamos éxito y enviamos a WhatsApp
        const mensaje = `Hola! Quiero activar mi comercio: ${nombre}. Categoría: ${dial}, Tipo: ${tipo}.`;
        window.location.href = `https://wa.me/584247573426?text=${encodeURIComponent(mensaje)}`;
    }

    // MAPA Y FILTROS
    async function verMapa(sub) {
        document.getElementById('map-title').innerText = sub;
        irA('map-view');
        const container = document.getElementById('filter-container');
        container.innerHTML = '<span>...</span>';
        const { data } = await _supabase.from('categorias').select('busqueda').eq('nombre', sub).single();
        if(data && data.busqueda) {
            container.innerHTML = '';
            data.busqueda.split(',').forEach(op => {
                const b = document.createElement('button');
                b.className = 'globito';
                b.innerText = op.trim();
                b.onclick = () => filtrarPines(op.trim());
                container.appendChild(b);
            });
        }
    }

    async function filtrarPines(tipo) {
        markersLayer.clearLayers();
        const { data } = await _supabase.from('Comercios').select('*').eq('Tipo', tipo).eq('Pago_confirmado', true);
        if(data) data.forEach(c => { L.marker([c.Latitud, c.Longitud]).addTo(markersLayer).bindPopup(c.Nombre); });
    }

    // NAVEGACIÓN Y DIALES
    function irA(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'map-view') setTimeout(() => map.invalidateSize(), 300);
    }

    function setupCarouselLogic(dIdx) {
        const car = document.getElementById(`car-${dIdx}`);
        let startX = 0, currentRot = 0, moved = false;
        car.addEventListener('touchstart', e => { startX = e.touches[0].pageX; currentRot = rotations[dIdx]; car.style.transition = 'none'; moved = false; });
        car.addEventListener('touchmove', e => { 
            let delta = (e.touches[0].pageX - startX) * 0.7; 
            if(Math.abs(delta) > 5) moved = true;
            updateRot(dIdx, currentRot + delta); 
        });
        car.addEventListener('touchend', () => {
            if(!moved) return;
            rotations[dIdx] = Math.round(rotations[dIdx] / 40) * 40;
            car.style.transition = 'transform 0.5s ease-out';
            updateRot(dIdx, rotations[dIdx]);
        });
    }

    function updateRot(dIdx, val) {
        rotations[dIdx] = val;
        const car = document.getElementById(`car-${dIdx}`);
        if(car) car.style.transform = `rotateY(${val}deg)`;
        for(let i=0; i<9; i++) {
            const el = document.getElementById(`it-${dIdx}-${i}`);
            if(el) {
                const b = i * 40;
                el.style.transform = `rotateY(${b}deg) translateZ(185px) rotateY(${-b - val}deg)`;
            }
        }
    }

    window.onload = inicializarApp;
</script>
</body>
</html>
