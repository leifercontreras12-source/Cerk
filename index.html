<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CERK v2.2 - Orbital</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #00e5ff; 
            /* Color de fondo "Pacífico" - Azul Pizarra Oscuro */
            --bg-color: #1a1f26; 
            --card-bg: rgba(30, 39, 51, 0.95); 
        }
        body { 
            background: var(--bg-color); color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding-bottom: 50px; overflow-x: hidden; touch-action: pan-y;
        }
        
        .app-container { display: flex; flex-direction: column; align-items: center; padding-top: 20px; }

        .brand {
            font-size: 2.8rem; font-weight: 900; letter-spacing: 10px;
            color: var(--primary); text-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
            margin-bottom: 25px;
        }

        .dial-wrapper {
            position: relative; width: 100%; height: 140px;
            display: flex; flex-direction: column; align-items: center;
            margin-bottom: 20px;
        }

        .dial-label {
            font-size: 0.75rem; color: var(--primary); font-weight: 800;
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px;
            opacity: 0.9;
        }

        .scene { 
            width: 100%; height: 80px; perspective: 1200px; 
            display: flex; justify-content: center; align-items: center;
        }

        .carousel {
            width: 140px; height: 65px; position: absolute;
            transform-style: preserve-3d; transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .carousel__item {
            position: absolute; width: 130px; height: 60px;
            background: var(--card-bg); border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 8px; display: flex; align-items: center;
            justify-content: center; font-size: 1.4rem; font-weight: bold;
            color: white; backface-visibility: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            /* Importante: El item mantendrá su propia rotación inversa */
            transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Marco Neón Corregido (Más grande y definido) */
        .selection-guide {
            position: absolute; top: 28px; width: 142px; height: 68px;
            border: 3px solid var(--primary); border-radius: 10px;
            pointer-events: none; 
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.5), inset 0 0 10px rgba(0, 229, 255, 0.2);
            z-index: 20;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="brand">CERK</div>
        <div id="dials-root"></div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE
        const SUPABASE_URL = "https://zuknitfklgiuoipnjraj.supabase.co/rest/v1/"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1a25pdGZrbGdpdW9pcG5qcmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NjY4OTcsImV4cCI6MjA5MzM0Mjg5N30.aOeE9uCgGM4DA8xgUap5zqXQqYxRZG0aDa3_V1Cjuxo";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const dialNames = [
            "Gastronomía", "Salud y Bienestar", "Estilo y Estética", 
            "Hogar y Construcción", "Motor e Industria", 
            "Insumos y Distribución", "Indefinido"
        ];

        const root = document.getElementById('dials-root');
        let rotations = new Array(7).fill(0);

        dialNames.forEach((name, dIdx) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'dial-wrapper';
            
            let itemsHTML = "";
            for(let i=1; i<=9; i++) {
                // Ángulo inicial de cada item
                const angle = (i-1) * 40;
                itemsHTML += `
                    <div class="carousel__item" id="item-${dIdx}-${i-1}" 
                         style="transform: rotateY(${angle}deg) translateZ(200px) rotateY(-${angle}deg)">
                        ${i}
                    </div>`;
            }

            wrapper.innerHTML = `
                <div class="dial-label">${name}</div>
                <div class="selection-guide"></div>
                <div class="scene">
                    <div class="carousel" id="carousel-${dIdx}">
                        ${itemsHTML}
                    </div>
                </div>
            `;
            root.appendChild(wrapper);

            const carousel = wrapper.querySelector('.carousel');
            let startX = 0;
            let currentRotation = 0;

            const updateOrbitalRotation = (newRotation) => {
                carousel.style.transform = `rotateY(${newRotation}deg)`;
                // Contrarrotación de cada hijo para que siempre miren al frente
                for(let i=0; i<9; i++) {
                    const item = document.getElementById(`item-${dIdx}-${i}`);
                    const itemBaseAngle = i * 40;
                    // La magia: ángulo base + rotación del dial compensada
                    item.style.transform = `rotateY(${itemBaseAngle}deg) translateZ(200px) rotateY(${-itemBaseAngle - newRotation}deg)`;
                }
            }

            carousel.addEventListener('touchstart', e => {
                startX = e.touches[0].pageX;
                currentRotation = rotations[dIdx];
                carousel.style.transition = 'none';
                // Quitamos transición a los hijos para movimiento fluido
                for(let i=0; i<9; i++) document.getElementById(`item-${dIdx}-${i}`).style.transition = 'none';
            });

            carousel.addEventListener('touchmove', e => {
                let diff = e.touches[0].pageX - startX;
                let tempRotation = currentRotation + diff * 0.3;
                updateOrbitalRotation(tempRotation);
            });

            carousel.addEventListener('touchend', e => {
                let diff = e.changedTouches[0].pageX - startX;
                let moveSteps = Math.round((diff * 0.3) / 40);
                rotations[dIdx] = currentRotation + (moveSteps * 40);

                carousel.style.transition = 'transform 0.7s cubic-bezier(0.23, 1, 0.32, 1)';
                for(let i=0; i<9; i++) document.getElementById(`item-${dIdx}-${i}`).style.transition = 'transform 0.7s cubic-bezier(0.23, 1, 0.32, 1)';
                
                updateOrbitalRotation(rotations[dIdx]);
            });

            carousel.addEventListener('click', () => {
                const currentStep = (Math.abs(rotations[dIdx] / 40) % 9) + 1;
                alert(`CERK: ${name} - Opción ${currentStep}`);
            });
        });
    </script>
</body>
</html>
