<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>+CERK v6.0 - MultiDial Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-base: #f4f7f9; --navy: #1a3a5f; --accent: #00b4d8; }
        body { 
            background-color: var(--bg-base);
            background-image: radial-gradient(circle at center, rgba(244,247,249,0.2) 0%, rgba(244,247,249,0.98) 100%),
            url("data:image/svg+xml;base64,CjxzdmcgeG1sbnM9J2h0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnJyB3aWR0aD0nODAwJyBoZWlnaHQ9JzgwMCcgdmlld0JveD0nMCAwIDgwMCA4MDAnPgogICAgPHJlY3Qgd2lkdGg9JzgwMCcgaGVpZ2h0PSc4MDAnIGZpbGw9JyNmNGY3ZjknLz4KICAgIDxnIHN0cm9rZT0nIzFhM2E1Zicgc3Ryb2tlLXdpZHRoPScxLjInIHN0cm9rZS1vcGFjaXR5PScwLjA4JyBmaWxsPSdub25lJz4KICAgICAgICA8cGF0aCBkPSdNMCAxNTAgTDgwMCAxNTAgTTAgNDUwIEw4MDAgNDUwIE0xNTAgMCBMMTUwIDgwMCBNNTUwIDAgTDU1MCA4MDAnLz4KICAgICAgICA8cGF0aCBkPSdNMCAwIEw4MDAgNjAwIE04MDAgMCBMMCA4MDAgTTMwMCAwIEw4MDAgNTAwIE0wIDMwMCBMNTAwIDgwMCcvPgogICAgPC9nPgo8L3N2Zz4=");
            background-attachment: fixed; margin: 0; font-family: 'Segoe UI', sans-serif; color: var(--navy); overflow-x: hidden;
        }
        .app-container { display: flex; flex-direction: column; align-items: center; padding: 20px 0; min-height: 100vh; }
        .brand { 
            font-family: "Brush Script MT", cursive; font-size: 4.5rem; margin-bottom: 5px; color: var(--navy);
            text-shadow: 1.5px 1.5px 0 var(--navy), -1.5px -1.5px 0 var(--navy), 1.5px -1.5px 0 var(--navy), -1.5px 1.5px 0 var(--navy);
            -webkit-text-stroke: 2px var(--navy); text-align: center; width: 100%;
        }
        .brand span { color: var(--accent); font-family: sans-serif; font-weight: 900; margin-right: -10px; -webkit-text-stroke: 0; }
        
        .dial-wrapper { width: 100%; height: 160px; display: flex; flex-direction: column; align-items: center; margin-bottom: 45px; }
        .dial-label { font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; color: var(--navy); opacity: 0.9; }
        
        .scene { width: 100%; height: 90px; perspective: 1200px; display: flex; justify-content: center; }
        .carousel { width: 130px; height: 80px; position: absolute; transform-style: preserve-3d; transition: transform 0.5s ease-out; }
        
        .carousel__item {
            position: absolute; width: 115px; height: 75px; background: white; border: 1.5px solid #d1d9e6; border-radius: 14px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 6px 15px rgba(26, 58, 95, 0.1); backface-visibility: hidden; overflow: hidden;
        }
        
        .item-img { width: 100%; height: 75%; object-fit: cover; border-bottom: 1px solid #f0f0f0; background: #eee; }
        .item-text { font-size: 0.55rem; font-weight: 900; color: var(--navy); margin: 4px 2px; text-transform: uppercase; text-align: center; line-height: 1.1; }
        .placeholder-icon { font-size: 1.5rem; color: #ccc; margin-bottom: 2px; }

        .footer-cta { width: 100%; background: white; padding: 35px 0; text-align: center; border-top: 1px solid #e0e0e0; margin-top: 40px; }
        .btn-registrar { background: var(--navy); color: white; padding: 14px 40px; border-radius: 40px; font-weight: 800; border: none; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="brand"><span>+</span>CERK</div>
        <div id="dials-root" style="width: 100%;"></div>
        <div class="footer-cta">
            <p style="margin:0 0 15px 0; font-weight:600; font-size:1rem;">¿Quieres formar parte de nuestro equipo?</p>
            <button class="btn-registrar">REGÍSTRATE</button>
        </div>
    </div>

    <script>
        // 1. CONFIGURACIÓN SUPABASE
        const SUPABASE_URL = "https://zuknitfklgiuoipnjraj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1a25pdGZrbGdpdW9pcG5qcmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NjY4OTcsImV4cCI6MjA5MzM0Mjg5N30.aOeE9uCgGM4DA8xgUap5zqXQqYxRZG0aDa3_V1Cjuxo";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. ESTRUCTURA DE LOS 7 DIALES
        const dialConfig = [
            { name: "Gastronomía", id: "gastronomia" },
            { name: "Salud y Bienestar", id: "salud" },
            { name: "Estilo y Estética", id: "estilo" },
            { name: "Hogar y Construcción", id: "hogar" },
            { name: "Motor e Industria", id: "motor" },
            { name: "Insumos y Distribución", id: "insumos" },
            { name: "Indefinido", id: "indefinido" }
        ];

        const root = document.getElementById('dials-root');
        let rotations = new Array(7).fill(0);

        async function inicializarApp() {
            // Obtenemos los datos de Gastronomía desde Supabase
            const { data: categoriasDB, error } = await _supabase
                .from('categorias')
                .select('*')
                .eq('grupo', 'Gastronomía')
                .order('orden', { ascending: true });

            dialConfig.forEach((config, dIdx) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'dial-wrapper';
                
                let itemsHTML = "";
                for (let i = 0; i < 9; i++) {
                    const angle = i * 40;
                    let content = "";

                    // Si es Gastronomía y tenemos datos en la DB
                    if (dIdx === 0 && categoriasDB && categoriasDB[i]) {
                        const item = categoriasDB[i];
                        const imagen = item.imagen_url || "https://via.placeholder.com/150?text=Cerk";
                        content = `<img src="${imagen}" class="item-img"><span class="item-text">${item.nombre}</span>`;
                    } else {
                        // Para los otros diales usamos un diseño "Próximamente"
                        content = `<div class="placeholder-icon">📍</div><span class="item-text">PRÓXIMAMENTE</span>`;
                    }
                    
                    itemsHTML += `<div class="carousel__item" id="it-${dIdx}-${i}" style="transform: rotateY(${angle}deg) translateZ(190px) rotateY(-${angle}deg)">${content}</div>`;
                }

                wrapper.innerHTML = `
                    <div class="dial-label">${config.name}</div>
                    <div class="scene">
                        <div class="carousel" id="car-${dIdx}">${itemsHTML}</div>
                    </div>
                `;
                root.appendChild(wrapper);

                setupCarouselLogic(dIdx);
            });
        }

        function setupCarouselLogic(dIdx) {
            const carousel = document.getElementById(`car-${dIdx}`);
            let startX = 0, currentRotation = 0;

            const updateRotation = (val) => {
                carousel.style.transform = `rotateY(${val}deg)`;
                for(let i=0; i<9; i++) {
                    const el = document.getElementById(`it-${dIdx}-${i}`);
                    if (!el) continue;
                    const baseAngle = i * 40;
                    el.style.transform = `rotateY(${baseAngle}deg) translateZ(190px) rotateY(${-baseAngle - val}deg)`;
                }
            };

            carousel.addEventListener('touchstart', e => { 
                startX = e.touches[0].pageX; 
                currentRotation = rotations[dIdx]; 
                carousel.style.transition = 'none'; 
            }, {passive: true});

            carousel.addEventListener('touchmove', e => { 
                let delta = (e.touches[0].pageX - startX) * 0.7;
                updateRotation(currentRotation + delta); 
            }, {passive: true});

            carousel.addEventListener('touchend', e => {
                let delta = (e.changedTouches[0].pageX - startX) * 0.7;
                rotations[dIdx] = currentRotation + Math.round(delta / 40) * 40;
                carousel.style.transition = 'transform 0.5s ease-out';
                updateRotation(rotations[dIdx]);
            });
        }

        // Encender la App
        window.onload = inicializarApp;
    </script>
</body>
</html>
