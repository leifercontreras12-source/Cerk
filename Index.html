<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CERK - Geolocalización de Urgencia</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #00e5ff; --dark: #0a0a0a; --gray: #1a1a1a; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        .header { text-align: center; padding: 30px 20px; background: linear-gradient(to bottom, #111, var(--dark)); }
        .logo-text { font-size: 3rem; font-weight: 900; letter-spacing: -2px; background: linear-gradient(45deg, #00838f, #00e5ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .container { padding: 10px; }
        .dial-section { margin-bottom: 50px; }
        .dial-title { padding-left: 20px; color: var(--primary); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }

        /* Estructura 3D del Dial */
        .scene { width: 100%; height: 100px; perspective: 1000px; display: flex; justify-content: center; align-items: center; }
        .carousel { width: 120px; height: 70px; position: absolute; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .carousel__item { 
            position: absolute; width: 110px; height: 60px; border: 1px solid rgba(0, 229, 255, 0.3);
            background: rgba(20, 20, 20, 0.9); border-radius: 10px; display: flex; align-items: center; 
            justify-content: center; font-size: 0.7rem; text-align: center; color: #fff; padding: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5); backface-visibility: hidden;
        }

        /* Footer */
        .footer { position: fixed; bottom: 0; width: 100%; background: rgba(10,10,10,0.95); padding: 20px; border-top: 1px solid #222; text-align: center; font-size: 0.8rem; z-index: 100; }
        .btn-reg { color: var(--primary); font-weight: bold; text-decoration: none; border: 1px solid var(--primary); padding: 5px 10px; border-radius: 20px; margin-left: 10px; transition: 0.3s; }
        .btn-reg:hover { background: var(--primary); color: black; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-text">CERK</div>
        <p style="font-size: 0.7rem; color: #666;">GEOLOCALIZACIÓN DE ACCIÓN INMEDIATA</p>
    </div>

    <div class="container" id="dials-root">
        </div>

    <div class="footer">
        ¿Quieres ser parte de nuestro equipo? <a href="#" class="btn-reg">REGÍSTRATE</a>
    </div>

    <script>
        // === CONFIGURACIÓN DE CONEXIÓN ===
        const SUPABASE_URL = "https://zuknitfklgiuoipnjraj.supabase.co/rest/v1/"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1a25pdGZrbGdpdW9pcG5qcmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NjY4OTcsImV4cCI6MjA5MzM0Mjg5N30.aOeE9uCgGM4DA8xgUap5zqXQqYxRZG0aDa3_V1Cjuxo";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const rubros = [
            { nombre: "Gastronomía", subs: ["Pizzerías", "Sushi", "Hamburguesas", "China", "Pollo", "Postres", "Cafés", "Tacos", "Arepas"] },
            { nombre: "Salud y Bienestar", subs: ["Farmacias", "Clínicas", "Dentistas", "Ópticas", "Laboratorios", "Gimnasios", "Spa", "Psicólogos", "Veterinarios"] },
            { nombre: "Motor e Industria", subs: ["Grúas", "Talleres", "Repuestos", "Caucheras", "Baterías", "Autolavado", "Latonería", "Motos", "Frenos"] }
        ];

        const root = document.getElementById('dials-root');

        rubros.forEach((r, rIdx) => {
            let section = document.createElement('div');
            section.className = 'dial-section';
            section.innerHTML = `<div class="dial-title">${r.nombre}</div>
                <div class="scene">
                    <div class="carousel" id="carousel-${rIdx}" onclick="rotateDial(${rIdx})">
                        ${r.subs.map((s, i) => `
                            <div class="carousel__item" style="transform: rotateY(${i * 40}deg) translateZ(160px)">
                                ${s}
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            root.appendChild(section);
        });

        let rotations = [0, 0, 0];
        function rotateDial(idx) {
            rotations[idx] -= 40;
            document.getElementById(`carousel-${idx}`).style.transform = `rotateY(${rotations[idx]}deg)`;
        }

        // Registrar visita al entrar
        async function initCERK() {
            try {
                await _supabase.rpc('increment_visitas', { row_id: 1 });
                console.log("CERK: Visita contabilizada");
            } catch (e) { console.log("Error de conexión"); }
        }
        initCERK();
    </script>
</body>
</html>
